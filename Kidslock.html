<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔒 KID LOCK - Screen Time Guardian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0b2b26;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .app-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1e4a4a 0%, #0e2a2a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .active-screen {
            text-align: center;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            background: rgba(255,248,225,0.95);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }

        .timer-circle {
            background: #1e2a2a;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            margin: 0 auto 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4), inset 0 0 0 3px #ffd966;
        }

        .time-digits {
            font-size: 3.2rem;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #f9e7b3, #ffcf6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .kid-message {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d4a3b;
            background: #fff3cf;
            padding: 12px 20px;
            border-radius: 60px;
            margin: 16px 0;
        }

        .usage-text {
            font-size: 1rem;
            color: #2c5a4a;
            background: #eef4e6;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
        }

        .penalty-warning {
            background: #ff6644;
            color: white;
            padding: 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .reset-btn {
            margin-top: 20px;
            background: #ffb347;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #a35f1a;
            transition: 0.07s linear;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #a35f1a;
        }

        .parent-gear {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(12px);
            z-index: 1500;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lock-card {
            background: #1f1a15e6;
            padding: 2rem;
            border-radius: 68px;
            max-width: 340px;
            text-align: center;
        }

        .lock-title {
            font-size: 2rem;
            font-weight: bold;
            color: #ffb347;
            margin: 15px 0;
        }

        .parent-unlock-btn {
            background: #ff9f4a;
            border: none;
            padding: 12px 22px;
            border-radius: 60px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; text-shadow: 0 0 6px #ffae70; }
        }

        .sleep-indicator {
            animation: pulse 1.2s infinite;
            color: #ffcc88;
            margin: 15px 0;
        }

        .pin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-box {
            background: #2c2c2c;
            padding: 30px;
            border-radius: 48px;
            text-align: center;
            width: 280px;
            border: 1px solid gold;
        }

        .pin-box h3 {
            color: gold;
            margin-bottom: 20px;
        }

        .pin-input {
            font-size: 2rem;
            letter-spacing: 12px;
            text-align: center;
            padding: 10px;
            width: 100%;
            background: #1a1a1a;
            color: white;
            border: 2px solid #ffb347;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .pin-btn {
            background: #ffb347;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .badge {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: #ffcc88;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="badge" id="sessionBadge">🔒 Session Active</div>

<div class="app-container">
    <div id="activeScreen" class="active-screen">
        <div class="timer-circle">
            <div class="time-digits" id="timerDisplay">02:00:00</div>
        </div>
        <div class="kid-message">⭐ Ask Parent for PIN to Exit ⭐</div>
        <div class="usage-text" id="statusMsg">2 hours remaining</div>
        <div id="penaltyMsg" class="penalty-warning" style="display:none;"></div>
        <button id="resetTimerBtn" class="reset-btn">🔄 Reset Session</button>
    </div>
</div>

<div id="parentGear" class="parent-gear">⚙️</div>

<script>
    // ========== PERSISTENT TIMER USING localStorage ==========
    let currentMinutes = 120;  // 2 hours default
    let timeLeftSeconds = currentMinutes * 60;
    let timerInterval = null;
    let isLocked = false;
    let startTime = null;
    
    // DOM elements
    const timerDisplay = document.getElementById('timerDisplay');
    const statusMsg = document.getElementById('statusMsg');
    const penaltyMsg = document.getElementById('penaltyMsg');
    const resetBtn = document.getElementById('resetTimerBtn');
    const parentGear = document.getElementById('parentGear');
    const sessionBadge = document.getElementById('sessionBadge');
    
    // Format time (HH:MM:SS)
    function formatTime(seconds) {
        if (seconds < 0) seconds = 0;
        const hours = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        if (hours > 0) {
            return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    // SAVE timer to localStorage (so it survives leaving the page)
    function saveTimer() {
        if (!isLocked) {
            localStorage.setItem('kidlock_timeLeft', timeLeftSeconds);
            localStorage.setItem('kidlock_timestamp', Date.now());
            localStorage.setItem('kidlock_minutes', currentMinutes);
        }
    }
    
    // LOAD timer from localStorage (when returning to page)
    function loadSavedTimer() {
        const savedTime = localStorage.getItem('kidlock_timeLeft');
        const savedTimestamp = localStorage.getItem('kidlock_timestamp');
        const savedMinutes = localStorage.getItem('kidlock_minutes');
        
        if (savedMinutes && !isNaN(parseInt(savedMinutes))) {
            currentMinutes = parseInt(savedMinutes);
        }
        
        if (savedTime && savedTimestamp && !isLocked) {
            const elapsed = Math.floor((Date.now() - parseInt(savedTimestamp)) / 1000);
            let remaining = parseInt(savedTime) - elapsed;
            
            if (remaining > 0) {
                timeLeftSeconds = remaining;
            } else {
                timeLeftSeconds = 0;
                activateLockAndSleep();
                return false;
            }
        } else {
            timeLeftSeconds = currentMinutes * 60;
        }
        
        updateUI();
        return true;
    }
    
    function updateUI() {
        timerDisplay.innerText = formatTime(timeLeftSeconds);
        if (!isLocked) {
            if (timeLeftSeconds <= 300 && timeLeftSeconds > 0) {
                statusMsg.innerText = `⚠️ ${Math.ceil(timeLeftSeconds/60)} minutes left!`;
            } else {
                statusMsg.innerText = `${currentMinutes} minutes remaining`;
            }
        }
    }
    
    // Penalty system - ADDS time (punishment for leaving)
    function addPenalty(minutes, reason) {
        if (isLocked) return;
        
        let penaltySeconds = minutes * 60;
        timeLeftSeconds += penaltySeconds;
        updateUI();
        saveTimer();
        
        penaltyMsg.style.display = "block";
        penaltyMsg.innerText = `⚠️ ${reason}! +${minutes} min penalty ⚠️`;
        
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        
        setTimeout(() => {
            if (penaltyMsg) penaltyMsg.style.display = "none";
        }, 5000);
    }
    
    function startCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if (isLocked) return;
            
            if (timeLeftSeconds <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                if (!isLocked) activateLockAndSleep();
            } else {
                timeLeftSeconds--;
                updateUI();
                saveTimer();
                
                if (timeLeftSeconds === 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    if (!isLocked) activateLockAndSleep();
                }
            }
        }, 1000);
    }
    
    function resetSession(newMinutes = null) {
        if (newMinutes !== null && newMinutes > 0) {
            currentMinutes = newMinutes;
        }
        timeLeftSeconds = currentMinutes * 60;
        updateUI();
        saveTimer();
        
        if (timerInterval) clearInterval(timerInterval);
        startCountdown();
        
        statusMsg.innerText = `✨ New ${currentMinutes} min session ✨`;
        sessionBadge.innerText = "🔒 Session Active";
        penaltyMsg.style.display = "none";
        
        // Force reload of saved time
        localStorage.setItem('kidlock_timeLeft', timeLeftSeconds);
        localStorage.setItem('kidlock_timestamp', Date.now());
    }
    
    function activateLockAndSleep() {
        if (isLocked) return;
        isLocked = true;
        
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        
        // Clear saved timer since session is over
        localStorage.removeItem('kidlock_timeLeft');
        sessionBadge.innerText = "🔒 LOCKED";
        
        const oldLock = document.getElementById('dynamicLockOverlay');
        if (oldLock) oldLock.remove();
        
        const lockDiv = document.createElement('div');
        lockDiv.id = 'dynamicLockOverlay';
        lockDiv.className = 'lock-overlay';
        lockDiv.innerHTML = `
            <div class="lock-card">
                <div style="font-size: 3rem;">🔒⏰😴</div>
                <div class="lock-title">TIME'S UP!</div>
                <div class="lock-message" style="color: white;">🚫 Screen time finished! 🚫</div>
                <div class="sleep-indicator">💤 PHONE SLEEP MODE 💤</div>
                <button id="parentUnlockLongPress" class="parent-unlock-btn">🔓 PARENT UNLOCK (hold 3 sec)</button>
                <div style="color:#aaa; font-size:0.7rem; margin-top:12px;">Only parent can unlock</div>
            </div>
        `;
        document.body.appendChild(lockDiv);
        
        const unlockBtn = document.getElementById('parentUnlockLongPress');
        let pressTimer = null;
        
        const startHold = (e) => {
            e.preventDefault();
            pressTimer = setTimeout(() => {
                isLocked = false;
                lockDiv.remove();
                resetSession(currentMinutes);
                if (navigator.vibrate) navigator.vibrate(200);
            }, 3000);
        };
        
        const cancelHold = () => {
            if (pressTimer) clearTimeout(pressTimer);
        };
        
        unlockBtn.addEventListener('mousedown', startHold);
        unlockBtn.addEventListener('mouseup', cancelHold);
        unlockBtn.addEventListener('mouseleave', cancelHold);
        unlockBtn.addEventListener('touchstart', startHold, {passive: false});
        unlockBtn.addEventListener('touchend', cancelHold);
    }
    
    // ========== PARENT PIN PROTECTION ==========
    function showPinModal(onSuccess) {
        const modal = document.createElement('div');
        modal.className = 'pin-modal';
        modal.innerHTML = `
            <div class="pin-box">
                <h3>🔐 Parent Access Only</h3>
                <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="****" inputmode="numeric">
                <div>
                    <button id="pinSubmitBtn" class="pin-btn">Submit</button>
                    <button id="pinCancelBtn" class="pin-btn">Cancel</button>
                </div>
                <div id="pinErrorMsg" style="color:#ff8888; margin-top:10px;"></div>
                <div style="color:#888; font-size:0.7rem; margin-top:12px;">PIN: 1234</div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const pinInput = document.getElementById('pinInput');
        const submitBtn = document.getElementById('pinSubmitBtn');
        const cancelBtn = document.getElementById('pinCancelBtn');
        const errorDiv = document.getElementById('pinErrorMsg');
        
        pinInput.focus();
        
        function verifyPin() {
            if (pinInput.value === '1234') {
                modal.remove();
                if (onSuccess) onSuccess();
            } else {
                errorDiv.innerText = '❌ Wrong PIN! (Use 1234)';
                pinInput.value = '';
                pinInput.focus();
                if (navigator.vibrate) navigator.vibrate(300);
            }
        }
        
        submitBtn.onclick = verifyPin;
        cancelBtn.onclick = () => modal.remove();
        pinInput.onkeypress = (e) => { if (e.key === 'Enter') verifyPin(); };
    }
    
    function showParentSettings() {
        const settingsDiv = document.createElement('div');
        settingsDiv.className = 'pin-modal';
        settingsDiv.innerHTML = `
            <div class="pin-box" style="width: 320px;">
                <h3>⚙️ Parent Settings</h3>
                <label style="color:white;">Screen time (minutes):</label>
                <input type="number" id="minutesInput" min="1" max="180" value="${currentMinutes}" style="width:100%; padding:10px; margin:10px 0; border-radius:20px;">
                <label style="color:#aaa; font-size:0.8rem;">60=1hr | 120=2hr | 180=3hr</label>
                <div style="margin-top:20px;">
                    <button id="saveSettingsBtn" class="pin-btn">Save</button>
                    <button id="closeSettingsBtn" class="pin-btn">Close</button>
                </div>
            </div>
        `;
        document.body.appendChild(settingsDiv);
        
        const minutesInput = document.getElementById('minutesInput');
        const saveBtn = document.getElementById('saveSettingsBtn');
        const closeBtn = document.getElementById('closeSettingsBtn');
        
        saveBtn.onclick = () => {
            let newMin = parseInt(minutesInput.value);
            if (isNaN(newMin)) newMin = 120;
            if (newMin < 1) newMin = 1;
            if (newMin > 180) newMin = 180;
            currentMinutes = newMin;
            if (!isLocked) {
                resetSession(currentMinutes);
            }
            settingsDiv.remove();
        };
        closeBtn.onclick = () => settingsDiv.remove();
    }
    
    parentGear.onclick = () => {
        if (isLocked) {
            alert("🔒 Phone is LOCKED! Use the unlock button on screen.");
            return;
        }
        showPinModal(() => { showParentSettings(); });
    };
    
    resetBtn.onclick = () => {
        if (!isLocked) {
            showPinModal(() => { 
                resetSession(currentMinutes);
            });
        }
    };
    
    // ========== AGGRESSIVE ANTI-LEAVE SYSTEM ==========
    
    // 1. Save timer constantly
    setInterval(saveTimer, 1000);
    
    // 2. Detect page visibility change (leaving tab/app)
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            // Kid left the page
            localStorage.setItem('kidlock_leftTime', Date.now());
            sessionBadge.innerText = "⚠️ DON'T LEAVE!";
        } else {
            // Kid came back
            const leftTime = localStorage.getItem('kidlock_leftTime');
            if (leftTime && !isLocked) {
                const awaySeconds = Math.floor((Date.now() - parseInt(leftTime)) / 1000);
                if (awaySeconds > 5) {
                    // Add penalty proportional to time away
                    const penaltyMin = Math.max(2, Math.floor(awaySeconds / 30));
                    addPenalty(penaltyMin, `You left for ${awaySeconds} seconds`);
                }
                localStorage.removeItem('kidlock_leftTime');
                sessionBadge.innerText = "🔒 Session Active";
            }
            loadSavedTimer();
        }
    });
    
    // 3. Block back button
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', function() {
        if (!isLocked) {
            addPenalty(5, "Back button pressed");
            history.pushState(null, null, location.href);
        } else {
            history.pushState(null, null, location.href);
        }
    });
    
    // 4. Block context menu
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    // 5. Block Dev Tools
    window.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
            addPenalty(10, "Dev tools blocked");
            return false;
        }
    });
    
    // 6. Disable pull-to-refresh
    let touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    });
    document.addEventListener('touchmove', (e) => {
        const scrollTop = document.documentElement.scrollTop;
        if (touchStartY < 100 && scrollTop === 0 && e.cancelable) {
            e.preventDefault();
        }
    }, { passive: false });
    
    // 7. Detect when app goes to background (mobile)
    window.addEventListener('pagehide', () => {
        saveTimer();
        localStorage.setItem('kidlock_hideTime', Date.now());
    });
    
    window.addEventListener('pageshow', () => {
        const hideTime = localStorage.getItem('kidlock_hideTime');
        if (hideTime && !isLocked) {
            const awaySeconds = Math.floor((Date.now() - parseInt(hideTime)) / 1000);
            if (awaySeconds > 10) {
                const penaltyMin = Math.min(5, Math.floor(awaySeconds / 60) + 1);
                addPenalty(penaltyMin, `App was closed for ${awaySeconds}s`);
            }
            localStorage.removeItem('kidlock_hideTime');
        }
        loadSavedTimer();
        if (timerInterval === null && !isLocked && timeLeftSeconds > 0) {
            startCountdown();
        }
    });
    
    // ========== INITIALIZE ==========
    loadSavedTimer();
    startCountdown();
</script>
</body>
</html>
