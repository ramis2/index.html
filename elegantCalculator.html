<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Fraction Calculator - Mixed Numbers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #4158D0 0%, #C850C0 46%, #FFCC70 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .calculator {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 550px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            background: linear-gradient(135deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            font-weight: bold;
        }
        
        .display {
            background: linear-gradient(135deg, #f6f9fc 0%, #e6f0fa 100%);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        #expression {
            background: rgba(255,255,255,0.9);
            border: 1px solid #d0e0f0;
            padding: 15px;
            font-size: 22px;
            text-align: right;
            font-family: monospace;
            border-radius: 15px;
            margin-bottom: 10px;
            min-height: 40px;
            word-break: break-all;
            color: #2c3e50;
        }
        
        #result {
            background: rgba(255,255,255,0.9);
            border: 1px solid #d0e0f0;
            padding: 12px 15px;
            font-size: 22px;
            text-align: right;
            font-family: monospace;
            border-radius: 15px;
            color: #C850C0;
            font-weight: bold;
        }
        
        .explanation {
            background: linear-gradient(135deg, #fff9e6 0%, #ffe6f0 100%);
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #C850C0;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }
        
        .explanation.show {
            display: block;
        }
        
        .explanation p {
            margin: 8px 0;
            color: #2c3e50;
        }
        
        .explanation .step {
            color: #C850C0;
            font-weight: bold;
        }
        
        .mixed-section {
            background: linear-gradient(135deg, #f0f7ff 0%, #ffe6f0 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .mixed-title {
            font-weight: bold;
            color: #4158D0;
            margin-bottom: 15px;
            text-align: center;
            font-size: 16px;
        }
        
        .mixed-builders {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .mixed-box {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #C850C0;
            min-width: 150px;
        }
        
        .mixed-label {
            text-align: center;
            font-size: 12px;
            color: #C850C0;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .mixed-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .mixed-input {
            width: 50px;
            height: 45px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-family: monospace;
            background: white;
            color: #4158D0;
            font-weight: bold;
        }
        
        .mixed-input:focus {
            outline: none;
            border-color: #C850C0;
        }
        
        .mixed-sep {
            font-size: 22px;
            font-weight: bold;
            color: #C850C0;
        }
        
        .mixed-operator {
            font-size: 40px;
            font-weight: bold;
            background: linear-gradient(135deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            min-width: 70px;
            text-align: center;
            cursor: pointer;
            padding: 10px;
        }
        
        .mixed-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .mixed-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        .mixed-btn:hover { transform: translateY(-2px); }
        .mixed-calc { background: linear-gradient(135deg, #48bb78, #38a169); }
        .mixed-clear { background: linear-gradient(135deg, #f56565, #e53e3e); }
        .mixed-swap { background: linear-gradient(135deg, #4299e1, #3182ce); }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        #inputField {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e7ff;
            border-radius: 25px;
            font-family: monospace;
            background: white;
        }
        
        #inputField:focus {
            outline: none;
            border-color: #C850C0;
        }
        
        #useBtn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #4158D0, #C850C0);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        
        button {
            height: 60px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: translateY(2px); }
        
        .number { background: linear-gradient(135deg, #4a5568, #2d3748); }
        .operator { background: linear-gradient(135deg, #ed8936, #dd6b20); }
        .clear { background: linear-gradient(135deg, #f56565, #e53e3e); }
        .space { background: linear-gradient(135deg, #4299e1, #3182ce); }
        .equals { background: linear-gradient(135deg, #48bb78, #38a169); grid-column: span 2; }
        
        #history {
            background: linear-gradient(135deg, #f6f9fc 0%, #ffe6f0 100%);
            padding: 15px;
            border-radius: 20px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 13px;
            margin-bottom: 15px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(200,80,192,0.2);
        }
        
        .history-result { color: #C850C0; font-weight: bold; }
        
        .footer {
            text-align: center;
            padding: 15px 0 5px 0;
            color: #718096;
            font-size: 13px;
            border-top: 1px solid rgba(200,80,192,0.2);
        }
        
        @media (max-width: 550px) {
            .calculator { padding: 15px; }
            .mixed-builders { flex-direction: column; }
            .mixed-operator { transform: rotate(90deg); margin: 10px 0; }
            .mixed-input { width: 45px; height: 40px; font-size: 16px; }
            .buttons button { height: 50px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧮 Fraction Calculator</h1>
        
        <div class="display">
            <div id="expression">2 1/2 ÷ 3 3/4</div>
            <div id="result">= 2/3</div>
            <div class="explanation" id="explanation">
                <div id="explanationText"></div>
            </div>
        </div>
        
        <div class="mixed-section">
            <div class="mixed-title">📝 Build Mixed Numbers</div>
            
            <div class="mixed-builders">
                <div class="mixed-box">
                    <div class="mixed-label">FIRST NUMBER</div>
                    <div class="mixed-row">
                        <input type="number" id="whole1" class="mixed-input" value="2" min="0">
                        <span class="mixed-sep"> </span>
                        <input type="number" id="num1" class="mixed-input" value="1" min="0">
                        <span class="mixed-sep">/</span>
                        <input type="number" id="den1" class="mixed-input" value="2" min="1">
                    </div>
                </div>
                
                <div class="mixed-operator" id="mixedOperator">÷</div>
                
                <div class="mixed-box">
                    <div class="mixed-label">SECOND NUMBER</div>
                    <div class="mixed-row">
                        <input type="number" id="whole2" class="mixed-input" value="3" min="0">
                        <span class="mixed-sep"> </span>
                        <input type="number" id="num2" class="mixed-input" value="3" min="0">
                        <span class="mixed-sep">/</span>
                        <input type="number" id="den2" class="mixed-input" value="4" min="1">
                    </div>
                </div>
            </div>
            
            <div class="mixed-buttons">
                <button class="mixed-btn mixed-calc" id="buildCalc">CALCULATE</button>
                <button class="mixed-btn mixed-clear" id="buildClear">CLEAR</button>
                <button class="mixed-btn mixed-swap" id="buildSwap">SWAP</button>
            </div>
        </div>
        
        <div class="input-group">
            <input type="text" id="inputField" value="2 1/2 ÷ 3 3/4" placeholder="e.g. 2 1/2 ÷ 3 3/4">
            <button id="useBtn">USE</button>
        </div>
        
        <div class="buttons">
            <button class="clear" id="clearAll">AC</button>
            <button class="clear" id="clear">C</button>
            <button class="space" id="spaceBtn">⎵</button>
            <button class="operator" id="divideBtn">÷</button>
            
            <button class="number" id="btn7">7</button>
            <button class="number" id="btn8">8</button>
            <button class="number" id="btn9">9</button>
            <button class="operator" id="multiplyBtn">×</button>
            
            <button class="number" id="btn4">4</button>
            <button class="number" id="btn5">5</button>
            <button class="number" id="btn6">6</button>
            <button class="operator" id="subtractBtn">-</button>
            
            <button class="number" id="btn1">1</button>
            <button class="number" id="btn2">2</button>
            <button class="number" id="btn3">3</button>
            <button class="operator" id="addBtn">+</button>
            
            <button class="number" id="btn0">0</button>
            <button class="number" id="slashBtn">/</button>
            <button class="equals" id="equalsBtn">=</button>
        </div>
        
        <div id="history"></div>
        
        <div class="footer">
            <p>© Jamal Ahmed a2026 Fraction Calculator. All rights reserved.</p>
            <p>Made with <span class="heart">❤️</span> on GitHub</p>
        </div>
    </div>

    <script>
        // Get elements
        const expression = document.getElementById('expression');
        const result = document.getElementById('result');
        const explanation = document.getElementById('explanation');
        const explanationText = document.getElementById('explanationText');
        const inputField = document.getElementById('inputField');
        const useBtn = document.getElementById('useBtn');
        const equalsBtn = document.getElementById('equalsBtn');
        const history = document.getElementById('history');
        const mixedOperator = document.getElementById('mixedOperator');
        
        const whole1 = document.getElementById('whole1');
        const num1 = document.getElementById('num1');
        const den1 = document.getElementById('den1');
        const whole2 = document.getElementById('whole2');
        const num2 = document.getElementById('num2');
        const den2 = document.getElementById('den2');
        
        const buildCalc = document.getElementById('buildCalc');
        const buildClear = document.getElementById('buildClear');
        const buildSwap = document.getElementById('buildSwap');
        
        const btn0 = document.getElementById('btn0');
        const btn1 = document.getElementById('btn1');
        const btn2 = document.getElementById('btn2');
        const btn3 = document.getElementById('btn3');
        const btn4 = document.getElementById('btn4');
        const btn5 = document.getElementById('btn5');
        const btn6 = document.getElementById('btn6');
        const btn7 = document.getElementById('btn7');
        const btn8 = document.getElementById('btn8');
        const btn9 = document.getElementById('btn9');
        const slashBtn = document.getElementById('slashBtn');
        const spaceBtn = document.getElementById('spaceBtn');
        const addBtn = document.getElementById('addBtn');
        const subtractBtn = document.getElementById('subtractBtn');
        const multiplyBtn = document.getElementById('multiplyBtn');
        const divideBtn = document.getElementById('divideBtn');
        const clear = document.getElementById('clear');
        const clearAll = document.getElementById('clearAll');
        
        let currentOp = '÷';
        function cycleOperator() {
            const ops = ['+', '-', '×', '÷'];
            let index = ops.indexOf(currentOp);
            index = (index + 1) % ops.length;
            currentOp = ops[index];
            mixedOperator.innerText = currentOp;
        }
        mixedOperator.onclick = cycleOperator;
        
        function buildExpression() {
            let w1 = parseInt(whole1.value) || 0;
            let n1 = parseInt(num1.value) || 0;
            let d1 = parseInt(den1.value) || 1;
            let w2 = parseInt(whole2.value) || 0;
            let n2 = parseInt(num2.value) || 0;
            let d2 = parseInt(den2.value) || 1;
            
            let opMap = { '+': '+', '-': '-', '×': '*', '÷': '/' };
            let calcOp = opMap[currentOp];
            
            return `${w1} ${n1}/${d1} ${calcOp} ${w2} ${n2}/${d2}`;
        }
        
        function gcd(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            while (b) {
                let t = b;
                b = a % b;
                a = t;
            }
            return a;
        }
        
        function simplify(n, d) {
            if (d === 0) return [0, 0];
            if (n === 0) return [0, 1];
            let g = gcd(n, d);
            return [n / g, d / g];
        }
        
        // CRITICAL FIX: Parse mixed numbers correctly
        function parseNumber(str) {
            str = str.trim();
            if (!str) return null;
            
            // Check for mixed number: "2 1/2"
            let mixedMatch = str.match(/^(\d+)\s+(\d+)\/(\d+)$/);
            if (mixedMatch) {
                let whole = parseInt(mixedMatch[1]);
                let num = parseInt(mixedMatch[2]);
                let den = parseInt(mixedMatch[3]);
                if (den === 0) den = 1;
                return { num: whole * den + num, den: den, original: str };
            }
            
            // Check for fraction: "1/2"
            let fracMatch = str.match(/^(\d+)\/(\d+)$/);
            if (fracMatch) {
                let num = parseInt(fracMatch[1]);
                let den = parseInt(fracMatch[2]);
                if (den === 0) den = 1;
                return { num: num, den: den, original: str };
            }
            
            // Check for whole number: "5"
            let wholeNum = parseInt(str);
            if (!isNaN(wholeNum)) {
                return { num: wholeNum, den: 1, original: str };
            }
            
            return null;
        }
        
        function formatResult(n, d) {
            if (d === 0) return "Error";
            if (n === 0) return "0";
            
            let [simpN, simpD] = simplify(n, d);
            
            if (simpD === 1) return simpN.toString();
            
            if (Math.abs(simpN) > Math.abs(simpD)) {
                let whole = Math.floor(simpN / simpD);
                let rem = Math.abs(simpN % simpD);
                if (rem === 0) return whole.toString();
                return `${whole} ${rem}/${simpD}`;
            }
            
            return `${simpN}/${simpD}`;
        }
        
        function generateExplanation(left, right, op, resultNum, resultDen) {
            let steps = [];
            
            steps.push(`<p><span class="step">Step 1:</span> Left: ${left.original} = ${left.num}/${left.den}</p>`);
            steps.push(`<p><span class="step">Step 2:</span> Right: ${right.original} = ${right.num}/${right.den}</p>`);
            
            if (op === '/' || op === '÷') {
                steps.push(`<p><span class="step">Step 3:</span> Division: flip the second fraction</p>`);
                steps.push(`<p>&nbsp;&nbsp;${right.num}/${right.den} → ${right.den}/${right.num}</p>`);
                steps.push(`<p><span class="step">Step 4:</span> Multiply: ${left.num}/${left.den} × ${right.den}/${right.num}</p>`);
                steps.push(`<p>&nbsp;&nbsp;= (${left.num} × ${right.den}) / (${left.den} × ${right.num})</p>`);
                steps.push(`<p>&nbsp;&nbsp;= ${left.num * right.den} / ${left.den * right.num}</p>`);
                steps.push(`<p><span class="step">Step 5:</span> Result = ${resultNum}/${resultDen}</p>`);
            } else if (op === '+' || op === '-') {
                let commonDen = left.den * right.den;
                steps.push(`<p><span class="step">Step 3:</span> Common denominator: ${left.den} × ${right.den} = ${commonDen}</p>`);
                steps.push(`<p><span class="step">Step 4:</span> Convert:</p>`);
                steps.push(`<p>&nbsp;&nbsp;${left.num}/${left.den} = ${left.num * right.den}/${commonDen}</p>`);
                steps.push(`<p>&nbsp;&nbsp;${right.num}/${right.den} = ${right.num * left.den}/${commonDen}</p>`);
                if (op === '+') {
                    steps.push(`<p><span class="step">Step 5:</span> Add: ${left.num * right.den} + ${right.num * left.den} = ${resultNum}</p>`);
                } else {
                    steps.push(`<p><span class="step">Step 5:</span> Subtract: ${left.num * right.den} - ${right.num * left.den} = ${resultNum}</p>`);
                }
                steps.push(`<p><span class="step">Step 6:</span> Result = ${resultNum}/${resultDen}</p>`);
            } else if (op === '*') {
                steps.push(`<p><span class="step">Step 3:</span> Multiply numerators: ${left.num} × ${right.num} = ${left.num * right.num}</p>`);
                steps.push(`<p><span class="step">Step 4:</span> Multiply denominators: ${left.den} × ${right.den} = ${left.den * right.den}</p>`);
                steps.push(`<p><span class="step">Step 5:</span> Result = ${resultNum}/${resultDen}</p>`);
            }
            
            let [simpNum, simpDen] = simplify(resultNum, resultDen);
            if (simpNum !== resultNum || simpDen !== resultDen) {
                let g = gcd(resultNum, resultDen);
                let stepNum = op === '/' ? 6 : (op === '*' ? 6 : 7);
                steps.push(`<p><span class="step">Step ${stepNum}:</span> Simplify by ${g} → ${simpNum}/${simpDen}</p>`);
            }
            
            let finalResult = formatResult(simpNum, simpDen);
            steps.push(`<p><span class="step">Final:</span> <strong>${finalResult}</strong></p>`);
            
            return steps.join('');
        }
        
        // MAIN CALCULATION FUNCTION - FIXED
        function calculate(expr) {
            expr = expr.trim();
            
            // Find the MAIN operator (the one that separates left and right)
            // We need to find the last operator that's NOT inside a fraction
            let op = '';
            let leftStr = '';
            let rightStr = '';
            let opIndex = -1;
            
            // Look for operators from the end to find the main one
            // Skip if it's inside a fraction (has numbers around it)
            for (let i = expr.length - 1; i >= 0; i--) {
                let c = expr[i];
                if (c === '+' || c === '-' || c === '*' || c === '/' || c === '÷') {
                    // Check if this operator is likely the main one
                    // If there's a space before and after, it's probably the operator
                    let before = i > 0 ? expr[i-1] : '';
                    let after = i < expr.length - 1 ? expr[i+1] : '';
                    
                    if (before === ' ' || after === ' ') {
                        opIndex = i;
                        op = c;
                        break;
                    }
                }
            }
            
            // If no operator found with spaces, try without spaces
            if (opIndex === -1) {
                for (let i = 0; i < expr.length; i++) {
                    let c = expr[i];
                    if (c === '+' || c === '-' || c === '*' || c === '/' || c === '÷') {
                        opIndex = i;
                        op = c;
                        break;
                    }
                }
            }
            
            if (opIndex === -1) {
                return { result: "Error: No operator", steps: "Error: No operator found. Use +, -, ×, ÷" };
            }
            
            leftStr = expr.substring(0, opIndex).trim();
            rightStr = expr.substring(opIndex + 1).trim();
            
            if (!leftStr || !rightStr) {
                return { result: "Error: Invalid format", steps: "Error: Missing left or right number" };
            }
            
            let left = parseNumber(leftStr);
            let right = parseNumber(rightStr);
            
            if (!left) {
                return { result: "Error: Invalid left number", steps: "Error: Could not parse: " + leftStr };
            }
            if (!right) {
                return { result: "Error: Invalid right number", steps: "Error: Could not parse: " + rightStr };
            }
            
            let num, den;
            
            if (op === '+') {
                num = left.num * right.den + right.num * left.den;
                den = left.den * right.den;
            } else if (op === '-') {
                num = left.num * right.den - right.num * left.den;
                den = left.den * right.den;
            } else if (op === '*') {
                num = left.num * right.num;
                den = left.den * right.den;
            } else if (op === '/' || op === '÷') {
                if (right.num === 0) {
                    return { result: "Error: Division by zero", steps: "Error: Cannot divide by zero" };
                }
                num = left.num * right.den;
                den = left.den * right.num;
            } else {
                return { result: "Error: Unknown operator", steps: "Error: Unknown operator: " + op };
            }
            
            let finalResult = formatResult(num, den);
            let steps = generateExplanation(left, right, op, num, den);
            
            return { result: finalResult, steps: steps };
        }
        
        function updateDisplay(expr) {
            expression.innerText = expr;
            let calc = calculate(expr);
            result.innerText = '= ' + calc.result;
            explanationText.innerHTML = calc.steps;
            explanation.classList.add('show');
            
            let div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${expr}</span><span class="history-result">${calc.result}</span>`;
            history.insertBefore(div, history.firstChild);
            if (history.children.length > 5) {
                history.removeChild(history.lastChild);
            }
        }
        
        // Button handlers
        btn0.onclick = () => inputField.value += '0';
        btn1.onclick = () => inputField.value += '1';
        btn2.onclick = () => inputField.value += '2';
        btn3.onclick = () => inputField.value += '3';
        btn4.onclick = () => inputField.value += '4';
        btn5.onclick = () => inputField.value += '5';
        btn6.onclick = () => inputField.value += '6';
        btn7.onclick = () => inputField.value += '7';
        btn8.onclick = () => inputField.value += '8';
        btn9.onclick = () => inputField.value += '9';
        slashBtn.onclick = () => inputField.value += '/';
        spaceBtn.onclick = () => inputField.value += ' ';
        addBtn.onclick = () => inputField.value += '+';
        subtractBtn.onclick = () => inputField.value += '-';
        multiplyBtn.onclick = () => inputField.value += '×';
        divideBtn.onclick = () => inputField.value += '÷';
        
        clear.onclick = () => {
            inputField.value = inputField.value.slice(0, -1);
        };
        
        clearAll.onclick = () => {
            inputField.value = '';
            expression.innerText = '';
            result.innerText = '=';
            explanation.classList.remove('show');
        };
        
        useBtn.onclick = () => updateDisplay(inputField.value);
        equalsBtn.onclick = () => updateDisplay(inputField.value);
        
        buildCalc.onclick = () => {
            let expr = buildExpression();
            inputField.value = expr;
            updateDisplay(expr);
        };
        
        buildClear.onclick = () => {
            whole1.value = '0';
            num1.value = '0';
            den1.value = '1';
            whole2.value = '0';
            num2.value = '0';
            den2.value = '1';
            currentOp = '÷';
            mixedOperator.innerText = '÷';
        };
        
        buildSwap.onclick = () => {
            [whole1.value, whole2.value] = [whole2.value, whole1.value];
            [num1.value, num2.value] = [num2.value, num1.value];
            [den1.value, den2.value] = [den2.value, den1.value];
        };
        
        // Initialize
        updateDisplay('2 1/2 ÷ 3 3/4');
    </script>
</body>
</html>
