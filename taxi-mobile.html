<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Taxi Dispatch - Driver Alerts</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e3c72; padding: 12px; padding-bottom: 80px; }
        .main-box { max-width: 100%; margin: 0 auto; background: white; border-radius: 20px; padding: 16px; }
        h1 { text-align: center; color: #1e3c72; font-size: 24px; }
        .subtitle { text-align: center; color: #10b981; font-size: 12px; margin-bottom: 15px; }
        
        .tabs { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .tab { background: white; border: 1px solid #ccc; padding: 10px 16px; font-size: 14px; font-weight: bold; border-radius: 30px; cursor: pointer; }
        .tab.active { background: #1e3c72; color: white; border: none; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat { background: #f0f0f0; padding: 12px; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #1e3c72; }
        .stat-label { font-size: 11px; color: #666; }
        
        .map-container { height: 300px; background: #ddd; border-radius: 12px; margin-bottom: 12px; }
        #map { height: 100%; width: 100%; border-radius: 12px; }
        
        .search-box { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 30px; margin-bottom: 12px; }
        .driver-list { max-height: 250px; overflow-y: auto; }
        .driver-item { background: #f5f5f5; padding: 12px; margin-bottom: 8px; border-radius: 12px; border-left: 4px solid #10b981; display: flex; justify-content: space-between; align-items: center; }
        .driver-item.busy { border-left-color: #ef4444; }
        .driver-info h4 { font-size: 16px; }
        .driver-info p { font-size: 12px; color: #666; }
        .driver-actions { display: flex; gap: 6px; }
        .driver-actions button { padding: 6px 12px; font-size: 11px; border-radius: 20px; }
        
        .form-card { background: #f5f5f5; padding: 16px; border-radius: 16px; margin-bottom: 16px; }
        .row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        .field { width: 100%; }
        .field label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        .field input, .field select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        button { background: #1e3c72; color: white; border: none; padding: 12px 20px; border-radius: 30px; font-weight: bold; font-size: 16px; width: 100%; }
        .btn-green { background: #10b981; }
        
        .drivers-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .driver-card { background: #f5f5f5; border-radius: 16px; padding: 15px; position: relative; border-left: 4px solid #10b981; }
        .driver-card.busy { border-left-color: #ef4444; }
        .delete-x { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        
        .table-wrapper { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
        .data-table th, .data-table td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .data-table th { background: #1e3c72; color: white; }
        
        /* DRIVER NOTIFICATION STYLES */
        .driver-notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border-radius: 20px;
            padding: 20px;
            z-index: 2000;
            animation: slideDown 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-left: 5px solid #10b981;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .driver-notification h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .driver-notification .notif-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .driver-notification .notif-label {
            font-weight: bold;
            opacity: 0.8;
        }
        
        .driver-notification .notif-value {
            font-weight: bold;
        }
        
        .driver-notification button {
            background: #10b981;
            margin-top: 12px;
            padding: 10px;
        }
        
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #333; color: white; padding: 12px; border-radius: 12px; text-align: center; display: none; z-index: 1000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; }
        
        @media (min-width: 768px) {
            .drivers-grid { grid-template-columns: repeat(2, 1fr); }
            .stats { grid-template-columns: repeat(4, 1fr); }
            .row { flex-direction: row; }
        }
    </style>
</head>
<body>
<div class="main-box">
    <h1>🚕 Taxi Dispatch</h1>
    <div class="subtitle">Driver gets customer info when dispatched</div>

    <div class="stats">
        <div class="stat"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-number" id="availCount">0</div><div class="stat-label">Available</div></div>
        <div class="stat"><div class="stat-number" id="busyCount">0</div><div class="stat-label">Busy</div></div>
        <div class="stat"><div class="stat-number" id="offCount">0</div><div class="stat-label">Offline</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="openTab('map')">🗺️ Map</button>
        <button class="tab" onclick="openTab('request')">📱 Request</button>
        <button class="tab" onclick="openTab('drivers')">🚗 Drivers</button>
        <button class="tab" onclick="openTab('trips')">📝 Trips</button>
        <button class="tab" onclick="openTab('rankings')">🏆 Rankings</button>
    </div>

    <div id="tabMap" class="tab-content">
        <div class="map-container"><div id="map"></div></div>
        <input type="text" id="mapSearch" class="search-box" placeholder="🔍 Search driver..." onkeyup="filterMapDrivers()">
        <div class="driver-list" id="mapDriversList"></div>
        <button onclick="openAddModal()">➕ Add New Driver</button>
    </div>

    <div id="tabRequest" class="tab-content" style="display:none">
        <div class="form-card">
            <h3 style="margin-bottom:12px">Request a Ride</h3>
            <div class="row">
                <div class="field"><label>Your Name</label><input type="text" id="reqName" placeholder="Full name"></div>
                <div class="field"><label>Phone</label><input type="text" id="reqPhone" placeholder="Phone number"></div>
            </div>
            <div class="row">
                <div class="field"><label>Pickup</label><input type="text" id="reqPickup" placeholder="Pickup address"></div>
                <div class="field"><label>Dropoff</label><input type="text" id="reqDropoff" placeholder="Destination"></div>
            </div>
            <div class="row">
                <div class="field"><label>Fare ($)</label><input type="number" id="reqFare" value="25" step="5"></div>
                <div class="field"><label>Ride Type</label>
                    <select id="reqType" onchange="document.getElementById('reqFare').value=this.value">
                        <option value="15">Standard $15</option>
                        <option value="20">Premium $20</option>
                        <option value="23">XL $23</option>
                        <option value="25">Custom $25</option>
                    </select>
                </div>
            </div>
            <button class="btn-green" onclick="submitRideRequest()">📞 REQUEST RIDE</button>
        </div>
        <div style="background:#f5f5f5; padding:12px; border-radius:16px;">
            <h3 style="margin-bottom:10px;">Recent Requests</h3>
            <div id="recentRequestsList"></div>
        </div>
    </div>

    <div id="tabDrivers" class="tab-content" style="display:none">
        <div style="margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap;">
            <button onclick="filterDriversList('all')" style="width:auto; padding:8px 16px;">All</button>
            <button onclick="filterDriversList('available')" style="width:auto; padding:8px 16px;">Available</button>
            <button onclick="filterDriversList('busy')" style="width:auto; padding:8px 16px;">Busy</button>
            <button onclick="filterDriversList('offline')" style="width:auto; padding:8px 16px;">Offline</button>
            <input type="text" id="driverSearch" placeholder="Search..." style="flex:1; padding:8px; border-radius:30px; border:1px solid #ddd;" onkeyup="searchDriversList()">
        </div>
        <div id="driversListContainer"></div>
    </div>

    <div id="tabTrips" class="tab-content" style="display:none">
        <div class="stats">
            <div class="stat"><div class="stat-number" id="tripsTotal">0</div><div class="stat-label">Total</div></div>
            <div class="stat"><div class="stat-number" id="tripsRevenue">$0</div><div class="stat-label">Revenue</div></div>
            <div class="stat"><div class="stat-number" id="tripsAvg">$0</div><div class="stat-label">Avg</div></div>
        </div>
        <div class="table-wrapper">
            <table class="data-table">
                <thead><tr><th>Date</th><th>Driver</th><th>Customer</th><th>Fare</th></tr></thead>
                <tbody id="tripsTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tabRankings" class="tab-content" style="display:none">
        <div class="table-wrapper">
            <table class="data-table">
                <thead><tr><th>Rank</th><th>Driver</th><th>Rating</th><th>Trips</th><th>Earnings</th></tr></thead>
                <tbody id="rankingsTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-box">
        <h3>Add New Driver</h3>
        <div class="field"><label>Name</label><input type="text" id="newName" placeholder="Driver name"></div>
        <div class="field"><label>Phone</label><input type="text" id="newPhone" placeholder="Phone number"></div>
        <div class="field"><label>Vehicle</label><input type="text" id="newVehicle" placeholder="Toyota Camry"></div>
        <div class="field"><label>License</label><input type="text" id="newPlate" placeholder="ABC123"></div>
        <div class="field"><label>Status</label>
            <select id="newStatus">
                <option value="available">Available</option>
                <option value="busy">Busy</option>
                <option value="offline">Offline</option>
            </select>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeAddModal()" style="background:#6b7280;">Cancel</button>
            <button onclick="addDriver()">Add Driver</button>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<script>
    const STORAGE_DRIVERS = 'taxi_mobile_drivers';
    const STORAGE_TRIPS = 'taxi_mobile_trips';
    const STORAGE_REQUESTS = 'taxi_mobile_requests';

    let allDrivers = [];
    let allTrips = [];
    let recentRequests = [];
    let map, mapMarkers = [];
    let currentDriverFilter = 'all';
    let driverSearchText = '';

    const ATLANTA_CENTER = { lat: 33.7490, lng: -84.3880 };
    const atlantaSpots = [
        { lat: 33.7490, lng: -84.3880 }, { lat: 33.7756, lng: -84.3963 },
        { lat: 33.7489, lng: -84.3819 }, { lat: 33.7600, lng: -84.3940 },
        { lat: 33.7450, lng: -84.3850 }, { lat: 33.7550, lng: -84.3900 }
    ];
    function randomLocation() { return atlantaSpots[Math.floor(Math.random() * atlantaSpots.length)]; }

    function loadData() {
        const savedDrivers = localStorage.getItem(STORAGE_DRIVERS);
        const savedTrips = localStorage.getItem(STORAGE_TRIPS);
        const savedRequests = localStorage.getItem(STORAGE_REQUESTS);
        allDrivers = savedDrivers ? JSON.parse(savedDrivers) : [];
        allTrips = savedTrips ? JSON.parse(savedTrips) : [];
        recentRequests = savedRequests ? JSON.parse(savedRequests) : [];
        refreshAll();
    }

    function saveAll() {
        localStorage.setItem(STORAGE_DRIVERS, JSON.stringify(allDrivers));
        localStorage.setItem(STORAGE_TRIPS, JSON.stringify(allTrips));
        localStorage.setItem(STORAGE_REQUESTS, JSON.stringify(recentRequests));
    }

    function refreshAll() {
        updateStats();
        updateMap();
        updateMapSidebar();
        updateDriversList();
        updateTripsTable();
        updateRankings();
        updateRecentRequests();
    }

    function updateStats() {
        document.getElementById('totalCount').innerText = allDrivers.length;
        document.getElementById('availCount').innerText = allDrivers.filter(d => d.status === 'available').length;
        document.getElementById('busyCount').innerText = allDrivers.filter(d => d.status === 'busy').length;
        document.getElementById('offCount').innerText = allDrivers.filter(d => d.status === 'offline').length;
    }

    function initMap() {
        map = L.map('map').setView([ATLANTA_CENTER.lat, ATLANTA_CENTER.lng], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap', subdomains: 'abcd'
        }).addTo(map);
        updateMap();
    }

    function updateMap() {
        if (!map) return;
        mapMarkers.forEach(m => map.removeLayer(m));
        mapMarkers = [];
        allDrivers.forEach(driver => {
            let color = driver.status === 'available' ? '#10b981' : (driver.status === 'busy' ? '#ef4444' : '#6b7280');
            let loc = driver.lat ? { lat: driver.lat, lng: driver.lng } : randomLocation();
            const marker = L.circleMarker([loc.lat, loc.lng], { radius: 10, fillColor: color, color: 'white', weight: 2, fillOpacity: 0.8 }).addTo(map);
            marker.bindPopup(`<b>${driver.name}</b><br>🚗 ${driver.vehicle || 'Unknown'}<br>📞 ${driver.phone}<br><button onclick="dispatchDriverAction('${driver.id}','${driver.name}')" style="background:#1e3c72;color:white;border:none;padding:5px;border-radius:5px;">Dispatch</button>`);
            mapMarkers.push(marker);
        });
    }

    function updateMapSidebar() {
        const container = document.getElementById('mapDriversList');
        const search = document.getElementById('mapSearch')?.value.toLowerCase() || '';
        let filtered = allDrivers.filter(d => d.name.toLowerCase().includes(search));
        if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center;padding:20px;">No drivers</div>'; return; }
        container.innerHTML = filtered.map(d => `
            <div class="driver-item ${d.status}" onclick="map.setView([${d.lat || ATLANTA_CENTER.lat}, ${d.lng || ATLANTA_CENTER.lng}], 14)">
                <div class="driver-info"><h4>${d.name}</h4><p>${d.vehicle || 'Unknown'}</p></div>
                <div class="driver-actions"><button onclick="event.stopPropagation(); dispatchDriverAction('${d.id}','${d.name}')">Dispatch</button></div>
            </div>
        `).join('');
    }

    function filterMapDrivers() { updateMapSidebar(); }

    // ============ DRIVER NOTIFICATION - SEND CUSTOMER INFO TO DRIVER ============
    function showDriverNotification(driverName, customerName, customerPhone, pickup, dropoff, fare) {
        const notification = document.createElement('div');
        notification.className = 'driver-notification';
        notification.innerHTML = `
            <h3>🚕 NEW TRIP ASSIGNED</h3>
            <div class="notif-row"><span class="notif-label">Driver:</span><span class="notif-value">${driverName}</span></div>
            <div class="notif-row"><span class="notif-label">Customer:</span><span class="notif-value">${customerName}</span></div>
            <div class="notif-row"><span class="notif-label">Customer Phone:</span><span class="notif-value">${customerPhone}</span></div>
            <div class="notif-row"><span class="notif-label">Pickup:</span><span class="notif-value">${pickup}</span></div>
            <div class="notif-row"><span class="notif-label">Dropoff:</span><span class="notif-value">${dropoff}</span></div>
            <div class="notif-row"><span class="notif-label">Fare:</span><span class="notif-value">$${fare}</span></div>
            <button onclick="copyDriverInfo('${customerPhone}', '${pickup}', '${dropoff}')">📋 Copy Customer Info</button>
            <button onclick="this.parentElement.remove()" style="background:#6b7280; margin-top:8px;">✓ Got it</button>
        `;
        document.body.appendChild(notification);
        
        // Auto remove after 15 seconds
        setTimeout(() => { if(notification.parentElement) notification.remove(); }, 15000);
    }
    
    function copyDriverInfo(phone, pickup, dropoff) {
        const info = `Customer Phone: ${phone}\nPickup: ${pickup}\nDropoff: ${dropoff}`;
        navigator.clipboard.writeText(info).then(() => {
            showToast('✅ Customer info copied to clipboard!', '#10b981');
        });
    }

    function dispatchDriverWithInfo(driverId, driverName, customerName, customerPhone, pickup, dropoff, fare) {
        let driver = allDrivers.find(d => d.id === driverId);
        if (driver && driver.status === 'available') {
            driver.status = 'busy';
            saveAll();
            refreshAll();
            
            // Send notification to driver with customer info
            showDriverNotification(driverName, customerName, customerPhone, pickup, dropoff, fare);
            showToast(`🚕 ${driverName} dispatched! Customer info sent.`, '#1e3c72');
        } else {
            showToast(`❌ ${driverName} not available`, '#ef4444');
        }
    }

    function completeTrip(driverId, driverName) {
        let driver = allDrivers.find(d => d.id === driverId);
        if (driver && driver.status === 'busy') {
            let fare = prompt(`💰 Enter fare amount for ${driverName}:`, "25");
            fare = parseFloat(fare) || 25;
            driver.status = 'available';
            driver.earnings = (driver.earnings || 0) + fare;
            driver.trips = (driver.trips || 0) + 1;
            const tripRecord = { id: Date.now(), date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString(), driver: driverName, customer: "Walk-in", fare: fare };
            allTrips.unshift(tripRecord);
            saveAll();
            refreshAll();
            showToast(`✅ ${driverName} completed! $${fare} earned.`, '#10b981');
        } else {
            showToast(`❌ ${driverName} is not on a trip!`, '#ef4444');
        }
    }

    function updateDriversList() {
        const container = document.getElementById('driversListContainer');
        let filtered = allDrivers;
        if (currentDriverFilter !== 'all') filtered = filtered.filter(d => d.status === currentDriverFilter);
        if (driverSearchText) filtered = filtered.filter(d => d.name.toLowerCase().includes(driverSearchText) || d.phone.includes(driverSearchText));
        if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;">No drivers</div>'; return; }
        
        let html = '<div class="drivers-grid">';
        filtered.forEach(d => {
            html += `
                <div class="driver-card ${d.status}">
                    <button class="delete-x" onclick="deleteDriverAction('${d.id}','${d.name}')">×</button>
                    <h3>${d.name}</h3>
                    <p>📞 ${d.phone}</p>
                    <p>🚗 ${d.vehicle || 'Unknown'}</p>
                    <p>⭐ ${d.rating || 5.0}/5 (${d.trips || 0} trips)</p>
                    <p>💰 $${d.earnings || 0}</p>
                    <select onchange="changeDriverStatus('${d.id}', this.value)" style="width:100%; padding:8px; margin:8px 0; border-radius:30px;">
                        <option value="available" ${d.status === 'available' ? 'selected' : ''}>🟢 Available</option>
                        <option value="busy" ${d.status === 'busy' ? 'selected' : ''}>🔴 Busy</option>
                        <option value="offline" ${d.status === 'offline' ? 'selected' : ''}>⚪ Offline</option>
                    </select>
                    <div style="display:flex; gap:8px;">
                        <button onclick="dispatchManual('${d.id}','${d.name}')" style="flex:1; background:#1e3c72;">Dispatch</button>
                        <button onclick="completeTrip('${d.id}','${d.name}')" style="flex:1; background:#10b981;">Complete</button>
                        <button onclick="callNumber('${d.phone}','${d.name}')" style="flex:1; background:#f59e0b;">📞 Call</button>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    }
    
    // Manual dispatch (when dispatcher assigns driver manually)
    function dispatchManual(driverId, driverName) {
        const customerName = prompt("Enter customer name:", "Walk-in Customer");
        if (!customerName) return;
        const customerPhone = prompt("Enter customer phone:", "N/A");
        const pickup = prompt("Enter pickup location:", "Unknown");
        const dropoff = prompt("Enter dropoff location:", "Unknown");
        const fare = parseFloat(prompt("Enter fare amount:", "25")) || 25;
        dispatchDriverWithInfo(driverId, driverName, customerName, customerPhone, pickup, dropoff, fare);
    }

    function filterDriversList(status) { currentDriverFilter = status; updateDriversList(); }
    function searchDriversList() { driverSearchText = document.getElementById('driverSearch').value.toLowerCase(); updateDriversList(); }
    function deleteDriverAction(id, name) { if (confirm(`Delete ${name}?`)) { allDrivers = allDrivers.filter(d => d.id !== id); saveAll(); refreshAll(); showToast(`Deleted ${name}`, '#ef4444'); } }
    function changeDriverStatus(id, newStatus) { let d = allDrivers.find(d => d.id === id); if (d) { d.status = newStatus; saveAll(); refreshAll(); showToast(`${d.name} status: ${newStatus}`, '#10b981'); } }

    function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
    function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
    
    function addDriver() {
        const name = document.getElementById('newName').value.trim();
        const phone = document.getElementById('newPhone').value.trim();
        if (!name || !phone) { showToast('Name and phone required!', '#ef4444'); return; }
        const newDriver = {
            id: 'd' + Date.now(), name: name, phone: phone,
            vehicle: document.getElementById('newVehicle').value.trim() || 'Unknown',
            plate: document.getElementById('newPlate').value.trim().toUpperCase() || 'NEW',
            status: document.getElementById('newStatus').value, rating: 5.0, trips: 0, earnings: 0,
            lat: randomLocation().lat, lng: randomLocation().lng
        };
        allDrivers.push(newDriver);
        saveAll();
        refreshAll();
        closeAddModal();
        showToast(`✅ ${name} added!`, '#10b981');
        document.getElementById('newName').value = '';
        document.getElementById('newPhone').value = '';
        document.getElementById('newVehicle').value = '';
        document.getElementById('newPlate').value = '';
    }

    function updateRecentRequests() {
        const container = document.getElementById('recentRequestsList');
        if (recentRequests.length === 0) { container.innerHTML = '<div style="text-align:center;padding:20px;">No requests yet</div>'; return; }
        container.innerHTML = recentRequests.slice(0, 10).map(r => `
            <div style="background:white; padding:12px; margin-bottom:8px; border-radius:12px; border-left:3px solid #10b981;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <div><b>${r.customerName}</b><br><small>🚗 ${r.driverName} | 💰 $${r.fare}</small></div>
                    <button onclick="callNumber('${r.customerPhone}','${r.customerName}')" style="background:#f59e0b; color:white; border:none; padding:8px 16px; border-radius:20px;">📞 Call</button>
                </div>
                <div style="font-size:11px; color:#666; margin-top:5px;">📍 ${r.pickup} → ${r.dropoff}</div>
            </div>
        `).join('');
    }

    function submitRideRequest() {
        const name = document.getElementById('reqName').value.trim();
        const phone = document.getElementById('reqPhone').value.trim();
        const pickup = document.getElementById('reqPickup').value.trim();
        const dropoff = document.getElementById('reqDropoff').value.trim();
        const fare = parseFloat(document.getElementById('reqFare').value);
        if (!name || !phone || !pickup || !dropoff) { showToast('Please fill all fields!', '#ef4444'); return; }
        
        const availableIndex = allDrivers.findIndex(d => d.status === 'available');
        if (availableIndex === -1) { showToast('No drivers available!', '#ef4444'); return; }
        
        const driver = allDrivers[availableIndex];
        
        // Dispatch driver with customer info
        dispatchDriverWithInfo(driver.id, driver.name, name, phone, pickup, dropoff, fare);
        
        // Update driver stats
        driver.trips += 1;
        driver.earnings += fare;
        
        const newTrip = { id: Date.now(), date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString(), driver: driver.name, customer: name, fare: fare };
        allTrips.unshift(newTrip);
        
        recentRequests.unshift({
            customerName: name, customerPhone: phone, pickup: pickup, dropoff: dropoff,
            fare: fare, driverName: driver.name, time: new Date().toLocaleTimeString()
        });
        
        saveAll();
        refreshAll();
        
        document.getElementById('reqName').value = '';
        document.getElementById('reqPhone').value = '';
        document.getElementById('reqPickup').value = '';
        document.getElementById('reqDropoff').value = '';
        
        showToast(`✅ ${driver.name} dispatched! Customer info sent to driver.`, '#10b981');
    }

    function updateTripsTable() {
        const tbody = document.getElementById('tripsTableBody');
        const total = allTrips.reduce((s, t) => s + t.fare, 0);
        document.getElementById('tripsTotal').innerText = allTrips.length;
        document.getElementById('tripsRevenue').innerText = `$${total.toFixed(2)}`;
        document.getElementById('tripsAvg').innerText = `$${(total / (allTrips.length || 1)).toFixed(2)}`;
        if (allTrips.length === 0) { tbody.innerHTML = '<tr><td colspan="4">No trips yet</td></tr>'; return; }
        tbody.innerHTML = allTrips.map(t => `<tr><td>${t.date}</td><td>${t.driver}</td><td>${t.customer}</td><td>$${t.fare}</td></tr>`).join('');
    }

    function updateRankings() {
        const sorted = [...allDrivers].sort((a, b) => b.rating - a.rating);
        const tbody = document.getElementById('rankingsTableBody');
        if (sorted.length === 0) { tbody.innerHTML = '<tr><td colspan="5">No drivers</td></tr>'; return; }
        tbody.innerHTML = sorted.map((d, i) => `<tr><td>${i+1}</td><td><b>${d.name}</b></td><td>⭐ ${d.rating}</td><td>${d.trips}</td><td>$${d.earnings}</td></tr>`).join('');
    }

    function callNumber(phone, name) {
        if (phone && phone !== 'N/A') {
            navigator.clipboard.writeText(phone).then(() => {
                showToast(`✅ ${phone} copied! Dial manually.`, '#10b981');
                alert(`Phone number ${phone} copied to clipboard!\n\nPlease dial manually.`);
            });
        } else { showToast('❌ No phone number', '#ef4444'); }
    }

    function showToast(msg, color) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.backgroundColor = color;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function openTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
        document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).style.display = 'block';
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        if (tabName === 'map') setTimeout(() => { if (map) map.invalidateSize(); }, 100);
    }

    loadData();
    window.onload = initMap;
</script>
</body>
</html>
