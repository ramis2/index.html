<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phone Break - Kids Screen Time Lock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #0b2b26;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1e4a4a 0%, #0e2a2a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Main active screen */
        .active-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            background: rgba(255,248,225,0.95);
            backdrop-filter: blur(2px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            position: relative;
        }

        .timer-circle {
            background: #1e2a2a;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4), inset 0 0 0 3px #ffd966;
        }

        .time-digits {
            font-size: 4.2rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f9e7b3, #ffcf6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .time-label {
            font-size: 1rem;
            color: #ecd9b4;
            font-weight: 500;
            margin-top: 8px;
        }

        .kid-message {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2d4a3b;
            background: #fff3cf;
            padding: 12px 20px;
            border-radius: 60px;
            margin: 16px 0 10px;
        }

        .usage-text {
            font-size: 1rem;
            color: #2c5a4a;
            background: #eef4e6;
            padding: 8px 16px;
            border-radius: 40px;
        }

        .reset-btn {
            margin-top: 20px;
            background: #ffb347;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 50px;
            color: #2d2b1f;
            cursor: pointer;
            box-shadow: 0 5px 0 #a35f1a;
            transition: 0.07s linear;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #a35f1a;
        }

        /* Parent Setup Button (discreet, corner) */
        .parent-gear {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255,215,0,0.5);
            transition: all 0.2s;
        }

        .parent-gear:active {
            transform: scale(0.92);
            background: rgba(0,0,0,0.8);
        }

        /* PIN Modal Overlay */
        .pin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .pin-box {
            background: #2c2c2c;
            padding: 30px;
            border-radius: 48px;
            text-align: center;
            width: 280px;
            border: 1px solid gold;
        }

        .pin-box h3 {
            color: gold;
            margin-bottom: 20px;
        }

        .pin-input {
            font-size: 2rem;
            letter-spacing: 12px;
            text-align: center;
            padding: 10px;
            width: 100%;
            background: #1a1a1a;
            color: white;
            border: 2px solid #ffb347;
            border-radius: 20px;
            font-family: monospace;
            margin-bottom: 20px;
        }

        .pin-btn {
            background: #ffb347;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .pin-error {
            color: #ff8888;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2a24;
            padding: 30px;
            border-radius: 48px;
            z-index: 2000;
            width: 300px;
            text-align: center;
            border: 2px solid #ffb347;
            box-shadow: 0 20px 40px black;
        }

        .settings-panel h3 {
            color: #ffb347;
            margin-bottom: 20px;
        }

        .settings-panel label {
            color: white;
            display: block;
            margin: 15px 0 5px;
        }

        .settings-panel input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            text-align: center;
            font-size: 1.1rem;
        }

        .settings-panel button {
            margin-top: 20px;
            background: #ffb347;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        /* Lock Screen Overlay */
        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lock-card {
            background: #1f1a15e6;
            padding: 2rem;
            border-radius: 68px;
            max-width: 340px;
            text-align: center;
        }

        .lock-title {
            font-size: 2rem;
            font-weight: bold;
            color: #ffb347;
            margin: 15px 0;
        }

        .lock-message {
            color: white;
            margin: 15px 0;
        }

        .parent-unlock-btn {
            background: #ff9f4a;
            border: none;
            padding: 12px 22px;
            border-radius: 60px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; text-shadow: 0 0 6px #ffae70; }
        }

        .sleep-indicator {
            animation: pulse 1.2s infinite;
            color: #ffcc88;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="activeScreen" class="active-screen">
        <div class="timer-circle">
            <div class="time-digits" id="timerDisplay">05:00</div>
            <div class="time-label">screen time left</div>
        </div>
        <div class="kid-message">⭐ Take a break, champ! ⭐</div>
        <div class="usage-text" id="statusMessage">Enjoy your time wisely</div>
        <button id="resetTimerBtn" class="reset-btn">➕ New session</button>
    </div>
</div>

<!-- Parent gear icon (always visible) -->
<div id="parentGear" class="parent-gear">⚙️</div>

<script>
    // ---------- CONFIGURATION ----------
    let currentMinutes = 5;     // default 5 minutes
    let timeLeftSeconds = currentMinutes * 60;
    let timerInterval = null;
    let isLocked = false;
    
    // DOM elements
    const timerDisplay = document.getElementById('timerDisplay');
    const statusMsg = document.getElementById('statusMessage');
    const resetBtn = document.getElementById('resetTimerBtn');
    const parentGear = document.getElementById('parentGear');
    
    // Helper: format time
    function formatTime(seconds) {
        if (seconds < 0) seconds = 0;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function updateUI() {
        if (timerDisplay) timerDisplay.innerText = formatTime(timeLeftSeconds);
        if (!isLocked && timeLeftSeconds <= 60 && timeLeftSeconds > 0) {
            statusMsg.innerText = `⚠️ Only ${Math.ceil(timeLeftSeconds/60)} minute left!`;
        } else if (!isLocked) {
            statusMsg.innerText = `📱 ${currentMinutes} min session active`;
        }
    }
    
    // Start countdown timer
    function startCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isLocked) return;
            if (timeLeftSeconds <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                if (!isLocked) activateLockAndSleep();
            } else {
                timeLeftSeconds--;
                updateUI();
                if (timeLeftSeconds === 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    if (!isLocked) activateLockAndSleep();
                }
            }
        }, 1000);
    }
    
    // Reset session (call from parent or reset button)
    function resetSession(newMinutes = null) {
        if (newMinutes !== null && newMinutes > 0) {
            currentMinutes = newMinutes;
        }
        timeLeftSeconds = currentMinutes * 60;
        updateUI();
        if (timerInterval) clearInterval(timerInterval);
        startCountdown();
        if (statusMsg) statusMsg.innerText = `✨ New ${currentMinutes} min session ✨`;
    }
    
    // LOCK SCREEN with overstaying + sleep
    function activateLockAndSleep() {
        if (isLocked) return;
        isLocked = true;
        if (timerInterval) clearInterval(timerInterval);
        
        // Remove existing lock
        const oldLock = document.getElementById('dynamicLockOverlay');
        if (oldLock) oldLock.remove();
        
        const lockDiv = document.createElement('div');
        lockDiv.id = 'dynamicLockOverlay';
        lockDiv.className = 'lock-overlay';
        lockDiv.innerHTML = `
            <div class="lock-card">
                <div style="font-size: 3rem;">🔒⏰😴</div>
                <div class="lock-title">TIME'S UP!</div>
                <div class="lock-message">
                    🚫 You've been on the screen too long! 🚫<br>
                    <strong>Overstaying is not healthy.</strong>
                </div>
                <div class="sleep-indicator">💤 Phone going to sleep mode... 💤</div>
                <button id="parentUnlockLongPress" class="parent-unlock-btn">🔓 PARENT UNLOCK (hold 3 sec)</button>
                <div style="color:#aaa; font-size:0.7rem; margin-top:12px;">Ask parent to hold button</div>
            </div>
        `;
        document.body.appendChild(lockDiv);
        
        // Long press unlock
        const unlockBtn = document.getElementById('parentUnlockLongPress');
        let pressTimer = null;
        const startHold = (e) => {
            e.preventDefault();
            pressTimer = setTimeout(() => {
                // Unlock and reset
                isLocked = false;
                lockDiv.remove();
                resetSession(currentMinutes);
                if (navigator.vibrate) navigator.vibrate(200);
            }, 3000);
        };
        const cancelHold = () => {
            if (pressTimer) clearTimeout(pressTimer);
        };
        unlockBtn.addEventListener('mousedown', startHold);
        unlockBtn.addEventListener('mouseup', cancelHold);
        unlockBtn.addEventListener('mouseleave', cancelHold);
        unlockBtn.addEventListener('touchstart', startHold, {passive: false});
        unlockBtn.addEventListener('touchend', cancelHold);
    }
    
    // ---------- PARENT SETUP (PIN protected) ----------
    let waitingForPin = false;
    let pendingSettingsCallback = null;
    
    function showPinModal(onSuccess) {
        const modal = document.createElement('div');
        modal.className = 'pin-modal';
        modal.innerHTML = `
            <div class="pin-box">
                <h3>🔐 Parent Access</h3>
                <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="****" inputmode="numeric">
                <div>
                    <button id="pinSubmitBtn" class="pin-btn">Submit</button>
                    <button id="pinCancelBtn" class="pin-btn">Cancel</button>
                </div>
                <div id="pinErrorMsg" class="pin-error"></div>
                <div style="color:#888; font-size:0.7rem; margin-top:12px;">Default PIN: 1234</div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const pinInput = document.getElementById('pinInput');
        const submitBtn = document.getElementById('pinSubmitBtn');
        const cancelBtn = document.getElementById('pinCancelBtn');
        const errorDiv = document.getElementById('pinErrorMsg');
        
        pinInput.focus();
        
        function verifyPin() {
            if (pinInput.value === '1234') {
                modal.remove();
                if (onSuccess) onSuccess();
            } else {
                errorDiv.innerText = '❌ Wrong PIN! Try again (1234)';
                pinInput.value = '';
                pinInput.focus();
            }
        }
        
        submitBtn.onclick = verifyPin;
        cancelBtn.onclick = () => modal.remove();
        pinInput.onkeypress = (e) => { if (e.key === 'Enter') verifyPin(); };
    }
    
    // Show settings panel (only after correct PIN)
    function showParentSettings() {
        const settingsDiv = document.createElement('div');
        settingsDiv.className = 'settings-panel';
        settingsDiv.innerHTML = `
            <h3>⚙️ Parent Settings</h3>
            <label>Screen time limit (minutes):</label>
            <input type="number" id="minutesInput" min="1" max="30" value="${currentMinutes}">
            <label style="margin-top:10px;">⚠️ New session will restart timer</label>
            <div>
                <button id="saveSettingsBtn">Save & Apply</button>
                <button id="closeSettingsBtn">Close</button>
            </div>
        `;
        document.body.appendChild(settingsDiv);
        
        const minutesInput = document.getElementById('minutesInput');
        const saveBtn = document.getElementById('saveSettingsBtn');
        const closeBtn = document.getElementById('closeSettingsBtn');
        
        saveBtn.onclick = () => {
            let newMin = parseInt(minutesInput.value);
            if (isNaN(newMin)) newMin = 5;
            if (newMin < 1) newMin = 1;
            if (newMin > 30) newMin = 30;
            currentMinutes = newMin;
            // Reset timer with new duration (only if NOT locked)
            if (!isLocked) {
                resetSession(currentMinutes);
            } else {
                // if locked, just update for next unlock
                timeLeftSeconds = currentMinutes * 60;
            }
            settingsDiv.remove();
        };
        closeBtn.onclick = () => settingsDiv.remove();
    }
    
    // Parent gear click: request PIN, then show settings
    parentGear.onclick = () => {
        if (isLocked) {
            // Can't access settings while locked (must unlock first)
            alert("🔒 Phone is locked! Please unlock first using parent button on lock screen.");
            return;
        }
        showPinModal(() => {
            showParentSettings();
        });
    };
    
    // Manual reset button (kids can press, but it just restarts same timer)
    resetBtn.onclick = () => {
        if (!isLocked) {
            resetSession(currentMinutes);
        }
    };
    
    // Block dev tools & context menu
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
        }
    });
    
    // Initialize
    resetSession(5);
</script>
</body>
</html>
