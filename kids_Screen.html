<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phone Break - Kids Screen Time Lock (2 Hours)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #0b2b26;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1e4a4a 0%, #0e2a2a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        /* Main active screen */
        .active-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            background: rgba(255,248,225,0.95);
            backdrop-filter: blur(2px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            position: relative;
            margin: 20px auto;
        }

        .timer-circle {
            background: #1e2a2a;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4), inset 0 0 0 3px #ffd966;
        }

        .time-digits {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f9e7b3, #ffcf6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .time-label {
            font-size: 1rem;
            color: #ecd9b4;
            font-weight: 500;
            margin-top: 8px;
        }

        .kid-message {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2d4a3b;
            background: #fff3cf;
            padding: 12px 20px;
            border-radius: 60px;
            margin: 16px 0 10px;
        }

        .usage-text {
            font-size: 1rem;
            color: #2c5a4a;
            background: #eef4e6;
            padding: 8px 16px;
            border-radius: 40px;
        }

        .reset-btn {
            margin-top: 20px;
            background: #ffb347;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 50px;
            color: #2d2b1f;
            cursor: pointer;
            box-shadow: 0 5px 0 #a35f1a;
            transition: 0.07s linear;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #a35f1a;
        }

        /* Parent Setup Button */
        .parent-gear {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255,215,0,0.5);
            transition: all 0.2s;
        }

        .parent-gear:active {
            transform: scale(0.92);
        }

        /* Help Button */
        .help-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255,215,0,0.5);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: #2d2a24;
            border-radius: 48px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            border: 2px solid #ffb347;
        }

        .modal-content h2 {
            color: #ffb347;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content h3 {
            color: #ffd966;
            margin: 20px 0 10px;
        }

        .modal-content p {
            color: white;
            margin: 10px 0;
            line-height: 1.5;
        }

        .step-box {
            background: #1e1b16;
            padding: 15px;
            border-radius: 24px;
            margin: 15px 0;
            border-left: 4px solid #ffb347;
        }

        .step-title {
            color: #ffb347;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .close-modal {
            background: #ffb347;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }

        .pin-modal, .settings-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-box, .settings-box {
            background: #2c2c2c;
            padding: 30px;
            border-radius: 48px;
            text-align: center;
            width: 320px;
            border: 1px solid gold;
        }

        .pin-box h3, .settings-box h3 {
            color: gold;
            margin-bottom: 20px;
        }

        .pin-input {
            font-size: 2rem;
            letter-spacing: 12px;
            text-align: center;
            padding: 10px;
            width: 100%;
            background: #1a1a1a;
            color: white;
            border: 2px solid #ffb347;
            border-radius: 20px;
            font-family: monospace;
            margin-bottom: 20px;
        }

        .pin-btn, .settings-btn {
            background: #ffb347;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        /* Lock Screen */
        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(12px);
            z-index: 1500;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lock-card {
            background: #1f1a15e6;
            padding: 2rem;
            border-radius: 68px;
            max-width: 340px;
            text-align: center;
        }

        .parent-unlock-btn {
            background: #ff9f4a;
            border: none;
            padding: 12px 22px;
            border-radius: 60px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; text-shadow: 0 0 6px #ffae70; }
        }

        .sleep-indicator {
            animation: pulse 1.2s infinite;
            color: #ffcc88;
            margin: 15px 0;
        }

        .warning-badge {
            background: #ff4444;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            display: inline-block;
        }

        @media (max-width: 550px) {
            .timer-circle {
                width: 180px;
                height: 180px;
            }
            .time-digits {
                font-size: 2.5rem;
            }
            .kid-message {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="activeScreen" class="active-screen">
        <div class="timer-circle">
            <div class="time-digits" id="timerDisplay">02:00:00</div>
            <div class="time-label">screen time left</div>
        </div>
        <div class="kid-message">⭐ Take a break, champ! ⭐</div>
        <div class="usage-text" id="statusMessage">2 hours of screen time</div>
        <button id="resetTimerBtn" class="reset-btn">➕ New session</button>
        <div class="warning-badge">⚠️ For full lock: tap "?" button</div>
    </div>
</div>

<!-- Buttons -->
<div id="parentGear" class="parent-gear">⚙️</div>
<div id="helpBtn" class="help-btn">❓</div>

<script>
    // ---------- CONFIGURATION ----------
    // DEFAULT: 2 HOURS (120 minutes)
    let currentMinutes = 120;     // 2 hours
    let timeLeftSeconds = currentMinutes * 60;
    let timerInterval = null;
    let isLocked = false;
    
    // DOM elements
    const timerDisplay = document.getElementById('timerDisplay');
    const statusMsg = document.getElementById('statusMessage');
    const resetBtn = document.getElementById('resetTimerBtn');
    const parentGear = document.getElementById('parentGear');
    const helpBtn = document.getElementById('helpBtn');
    
    function formatTime(seconds) {
        if (seconds < 0) seconds = 0;
        const hours = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        
        if (hours > 0) {
            return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function updateUI() {
        if (timerDisplay) timerDisplay.innerText = formatTime(timeLeftSeconds);
        if (!isLocked && timeLeftSeconds <= 300 && timeLeftSeconds > 0) {
            // Warning when 5 minutes or less remaining
            const minsLeft = Math.ceil(timeLeftSeconds / 60);
            statusMsg.innerText = `⚠️ Only ${minsLeft} minute${minsLeft > 1 ? 's' : ''} left!`;
            statusMsg.style.background = "#ffe0b3";
        } else if (!isLocked) {
            statusMsg.innerText = `📱 ${currentMinutes} min session active`;
            statusMsg.style.background = "#eef4e6";
        }
    }
    
    function startCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isLocked) return;
            if (timeLeftSeconds <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                if (!isLocked) activateLockAndSleep();
            } else {
                timeLeftSeconds--;
                updateUI();
                if (timeLeftSeconds === 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    if (!isLocked) activateLockAndSleep();
                }
            }
        }, 1000);
    }
    
    function resetSession(newMinutes = null) {
        if (newMinutes !== null && newMinutes > 0) {
            currentMinutes = newMinutes;
        }
        timeLeftSeconds = currentMinutes * 60;
        updateUI();
        if (timerInterval) clearInterval(timerInterval);
        startCountdown();
        if (statusMsg) {
            statusMsg.innerText = `✨ New ${currentMinutes} min session ✨`;
            statusMsg.style.background = "#eef4e6";
        }
    }
    
    function activateLockAndSleep() {
        if (isLocked) return;
        isLocked = true;
        if (timerInterval) clearInterval(timerInterval);
        
        const oldLock = document.getElementById('dynamicLockOverlay');
        if (oldLock) oldLock.remove();
        
        const lockDiv = document.createElement('div');
        lockDiv.id = 'dynamicLockOverlay';
        lockDiv.className = 'lock-overlay';
        lockDiv.innerHTML = `
            <div class="lock-card">
                <div style="font-size: 3rem;">🔒⏰😴</div>
                <div style="font-size: 2rem; font-weight: bold; color: #ffb347; margin: 15px 0;">TIME'S UP!</div>
                <div class="lock-message" style="color: white;">
                    🚫 You've been on the screen too long! 🚫<br>
                    <strong>Overstaying is not healthy.</strong>
                </div>
                <div class="sleep-indicator">💤 Phone going to sleep mode... 💤</div>
                <button id="parentUnlockLongPress" class="parent-unlock-btn">🔓 PARENT UNLOCK (hold 3 sec)</button>
                <div style="color:#aaa; font-size:0.7rem; margin-top:12px;">Ask parent to hold button</div>
            </div>
        `;
        document.body.appendChild(lockDiv);
        
        const unlockBtn = document.getElementById('parentUnlockLongPress');
        let pressTimer = null;
        const startHold = (e) => {
            e.preventDefault();
            pressTimer = setTimeout(() => {
                isLocked = false;
                lockDiv.remove();
                resetSession(currentMinutes);
                if (navigator.vibrate) navigator.vibrate(200);
            }, 3000);
        };
        const cancelHold = () => {
            if (pressTimer) clearTimeout(pressTimer);
        };
        unlockBtn.addEventListener('mousedown', startHold);
        unlockBtn.addEventListener('mouseup', cancelHold);
        unlockBtn.addEventListener('mouseleave', cancelHold);
        unlockBtn.addEventListener('touchstart', startHold, {passive: false});
        unlockBtn.addEventListener('touchend', cancelHold);
    }
    
    // ---------- HELP MODAL (Guided Access Instructions) ----------
    function showHelpModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🔒 How to REALLY lock the phone</h2>
                <p style="color: #ff8888; text-align: center; margin-bottom: 15px;">
                    ⚠️ A website CANNOT lock the home button by itself!<br>
                    Use your phone's built-in feature below:
                </p>
                
                <h3>📱 For iPhone / iPad (Guided Access)</h3>
                <div class="step-box">
                    <div class="step-title">Step 1:</div>
                    <p>Go to <strong>Settings → Accessibility → Guided Access</strong></p>
                </div>
                <div class="step-box">
                    <div class="step-title">Step 2:</div>
                    <p>Turn ON Guided Access and set a <strong>passcode</strong></p>
                </div>
                <div class="step-box">
                    <div class="step-title">Step 3:</div>
                    <p>Open this webpage, then <strong>triple-click the side button</strong></p>
                </div>
                <div class="step-box">
                    <div class="step-title">Step 4:</div>
                    <p>Tap <strong>"Start"</strong> in the top-right corner</p>
                </div>
                <div class="step-box">
                    <div class="step-title">✅ Result:</div>
                    <p>Home button is DISABLED! Phone locked to this screen.</p>
                </div>
                
                <h3>🤖 For Android (Screen Pinning)</h3>
                <div class="step-box">
                    <div class="step-title">Step 1:</div>
                    <p>Go to <strong>Settings → Security → Screen Pinning</strong></p>
                </div>
                <div class="step-box">
                    <div class="step-title">Step 2:</div>
                    <p>Turn ON Screen Pinning</p>
                </div>
                <div class="step-box">
                    <div class="step-title">Step 3:</div>
                    <p>Open Chrome, go to this webpage, tap <strong>Overview button</strong></p>
                </div>
                <div class="step-box">
                    <div class="step-title">Step 4:</div>
                    <p>Tap the <strong>pin icon</strong> on the browser window</p>
                </div>
                
                <h3>🔓 How to Exit (Parent Only)</h3>
                <div class="step-box">
                    <div class="step-title">iPhone/iPad:</div>
                    <p><strong>Triple-click side button</strong> → Enter passcode → Tap "End"</p>
                </div>
                <div class="step-box">
                    <div class="step-title">Android:</div>
                    <p>Press and hold <strong>Back + Overview buttons</strong> together</p>
                </div>
                
                <button class="close-modal" onclick="this.closest('.modal-overlay').remove()">Got it! Close</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    // ---------- PARENT SETUP (PIN protected) ----------
    function showPinModal(onSuccess) {
        const modal = document.createElement('div');
        modal.className = 'pin-modal';
        modal.innerHTML = `
            <div class="pin-box">
                <h3>🔐 Parent Access</h3>
                <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="****" inputmode="numeric">
                <div>
                    <button id="pinSubmitBtn" class="pin-btn">Submit</button>
                    <button id="pinCancelBtn" class="pin-btn">Cancel</button>
                </div>
                <div id="pinErrorMsg" class="pin-error"></div>
                <div style="color:#888; font-size:0.7rem; margin-top:12px;">Default PIN: 1234</div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const pinInput = document.getElementById('pinInput');
        const submitBtn = document.getElementById('pinSubmitBtn');
        const cancelBtn = document.getElementById('pinCancelBtn');
        const errorDiv = document.getElementById('pinErrorMsg');
        
        pinInput.focus();
        
        function verifyPin() {
            if (pinInput.value === '1234') {
                modal.remove();
                if (onSuccess) onSuccess();
            } else {
                errorDiv.innerText = '❌ Wrong PIN! Try again (1234)';
                pinInput.value = '';
                pinInput.focus();
            }
        }
        
        submitBtn.onclick = verifyPin;
        cancelBtn.onclick = () => modal.remove();
        pinInput.onkeypress = (e) => { if (e.key === 'Enter') verifyPin(); };
    }
    
    function showParentSettings() {
        const settingsDiv = document.createElement('div');
        settingsDiv.className = 'settings-panel';
        settingsDiv.innerHTML = `
            <div class="settings-box" style="width: 320px;">
                <h3>⚙️ Parent Settings</h3>
                <label style="color:white;">Screen time limit (minutes):</label>
                <input type="number" id="minutesInput" min="1" max="120" value="${currentMinutes}" style="width:100%; padding:10px; margin:10px 0; border-radius:20px; font-size:1rem;">
                <label style="color:white; font-size:0.8rem;">💡 60 min = 1 hour | 90 min = 1.5 hr | 120 min = 2 hours</label>
                <div style="margin-top:20px;">
                    <button id="saveSettingsBtn" class="settings-btn">Save & Apply</button>
                    <button id="closeSettingsBtn" class="settings-btn">Close</button>
                </div>
            </div>
        `;
        document.body.appendChild(settingsDiv);
        
        const minutesInput = document.getElementById('minutesInput');
        const saveBtn = document.getElementById('saveSettingsBtn');
        const closeBtn = document.getElementById('closeSettingsBtn');
        
        saveBtn.onclick = () => {
            let newMin = parseInt(minutesInput.value);
            if (isNaN(newMin)) newMin = 120;
            if (newMin < 1) newMin = 1;
            if (newMin > 120) newMin = 120;
            currentMinutes = newMin;
            if (!isLocked) {
                resetSession(currentMinutes);
            } else {
                timeLeftSeconds = currentMinutes * 60;
            }
            settingsDiv.remove();
        };
        closeBtn.onclick = () => settingsDiv.remove();
    }
    
    // Event listeners
    parentGear.onclick = () => {
        if (isLocked) {
            alert("🔒 Phone is locked! Please unlock first using parent button on lock screen.");
            return;
        }
        showPinModal(() => {
            showParentSettings();
        });
    };
    
    helpBtn.onclick = () => {
        showHelpModal();
    };
    
    resetBtn.onclick = () => {
        if (!isLocked) {
            resetSession(currentMinutes);
        }
    };
    
    // Block dev tools & context menu
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
        }
    });
    
    // Detect when user leaves the browser (for awareness)
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && !isLocked) {
            console.log("⚠️ Browser went to background - timer still running!");
        }
    });
    
    // Initialize with 2 hours (120 minutes)
    resetSession(120);
</script>
</body>
</html>
