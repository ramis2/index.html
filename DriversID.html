<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Card Generator</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ── RESET & BASE ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .app-container {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10);
            padding: 36px 40px 44px;
            transition: 0.25s;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0b1a33;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        h1 i {
            color: #2a7de1;
            font-size: 30px;
        }

        /* ── GRID LAYOUT ── */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* ── LEFT PANEL: FORM ── */
        .form-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1f2a44;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .form-group label i {
            color: #2a7de1;
            width: 18px;
            font-size: 15px;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px 16px;
            border: 1.5px solid #d8e0eb;
            border-radius: 14px;
            font-size: 15px;
            background: #f9fafc;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #2a7de1;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(42, 125, 225, 0.12);
        }
        .form-group input::placeholder {
            color: #a5b3cc;
            font-weight: 400;
        }

        .hint-big {
            font-size: 12px;
            color: #7b8aa8;
            margin-top: 2px;
            font-weight: 500;
        }
        .hint-big i {
            margin-right: 4px;
        }

        /* ── PHOTO UPLOAD SECTIONS (shared) ── */
        .photo-upload-section {
            background: #f6f8fc;
            border-radius: 18px;
            padding: 16px 18px 18px;
            border: 1.5px dashed #c8d4e6;
            transition: 0.2s;
        }
        .photo-upload-section:hover {
            border-color: #2a7de1;
            background: #f2f6fe;
        }

        .photo-upload-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
        }

        .photo-preview-box {
            width: 90px;
            height: 70px;
            border-radius: 12px;
            background: #e9eef6;
            border: 2px solid #d0daea;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
            position: relative;
        }
        /* specific sizing for the main photo (portrait) */
        .photo-preview-box.main-photo {
            height: 110px;
            width: 90px;
        }
        .photo-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .photo-preview-box .placeholder-icon {
            color: #9aadc9;
            font-size: 28px;
            opacity: 0.6;
        }
        .photo-preview-box.main-photo .placeholder-icon {
            font-size: 34px;
        }

        .photo-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-photo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            background: #ffffff;
            color: #1f2a44;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1.5px solid #d8e0eb;
        }
        .btn-photo i {
            font-size: 16px;
        }
        .btn-photo:hover {
            background: #eef4ff;
            border-color: #2a7de1;
            transform: translateY(-1px);
        }
        .btn-photo.primary {
            background: #2a7de1;
            border-color: #2a7de1;
            color: #fff;
        }
        .btn-photo.primary:hover {
            background: #1b66c4;
            border-color: #1b66c4;
        }
        .btn-photo.danger {
            color: #c53e3e;
            border-color: #f5d6d6;
        }
        .btn-photo.danger:hover {
            background: #ffe8e8;
            border-color: #c53e3e;
        }
        .btn-photo:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* ── ACTION BUTTONS ── */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1.5px solid #e6ecf5;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            background: #f0f4fe;
            color: #0b1a33;
            flex: 1 1 auto;
            justify-content: center;
            border: 1.5px solid transparent;
        }
        .btn-action i {
            font-size: 18px;
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }
        .btn-action.save {
            background: #0b1a33;
            color: #fff;
        }
        .btn-action.save:hover {
            background: #1f2f4e;
        }
        .btn-action.preview {
            background: #2a7de1;
            color: #fff;
        }
        .btn-action.preview:hover {
            background: #1b66c4;
        }
        .btn-action.download {
            background: #1d9b5e;
            color: #fff;
        }
        .btn-action.download:hover {
            background: #16804d;
        }

        /* ── RIGHT PANEL: PREVIEW ── */
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .preview-label {
            font-weight: 600;
            font-size: 15px;
            color: #2f3e5c;
            letter-spacing: 0.5px;
            align-self: flex-start;
        }
        .preview-label i {
            margin-right: 8px;
            color: #2a7de1;
        }

        .id-card-wrapper {
            background: #f8faff;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.07);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e4ebf6;
            transition: 0.2s;
        }

        /* ── THE ID CARD ── */
        .id-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px 26px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef2f9;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── LOGO (rectangle, very top) ── */
        .id-logo {
            width: 100%;
            height: 65px;
            background: #f4f8ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e6ecf5;
            overflow: hidden;
            transition: 0.2s;
            margin-bottom: 4px;
        }
        .id-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .id-logo .no-logo {
            color: #b0c2db;
            font-size: 26px;
            opacity: 0.5;
        }

        /* ── PHOTO on card (rectangle) ── */
        .id-photo {
            width: 100%;
            aspect-ratio: 4 / 5;
            background: #eef2f8;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e6ecf5;
            transition: 0.2s;
            margin-bottom: 4px;
        }
        .id-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .id-photo .no-photo {
            color: #b0c2db;
            font-size: 44px;
            opacity: 0.5;
        }

        .id-field {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .id-field .field-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #8599b9;
        }
        .id-field .field-value {
            font-weight: 700;
            color: #0b1a33;
            word-break: break-word;
        }

        /* big font placeholders */
        .id-name .field-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
        }
        .id-company .field-value {
            font-size: 26px;
            font-weight: 700;
            color: #1a2f50;
        }
        .id-expiry .field-value {
            font-size: 24px;
            font-weight: 700;
            color: #1d5b8e;
        }

        .id-divider {
            height: 1.5px;
            background: linear-gradient(to right, #e0e8f2, #b8c9e0, #e0e8f2);
            margin: 4px 0 6px;
        }

        /* ── LEFT PANEL COPYRIGHT (footer) ── */
        .left-copyright {
            margin-top: 6px;
            padding-top: 14px;
            border-top: 1.5px solid #e6ecf5;
            font-size: 13px;
            color: #7b8aa8;
            text-align: center;
            letter-spacing: 0.3px;
            font-weight: 500;
        }
        .left-copyright .field-value {
            font-size: 13px;
            font-weight: 500;
            color: #6b7b9a;
        }
        .left-copyright i {
            color: #2a7de1;
            margin-right: 4px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 820px) {
            .two-col {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .app-container {
                padding: 24px 18px 30px;
            }
            .id-card-wrapper {
                max-width: 100%;
            }
            .action-bar {
                flex-direction: column;
            }
            .btn-action {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .photo-upload-row {
                flex-direction: column;
                align-items: stretch;
            }
            .photo-preview-box {
                width: 100%;
                height: 100px;
            }
            .photo-preview-box.main-photo {
                height: 140px;
            }
            .photo-buttons {
                justify-content: center;
            }
            .id-card {
                padding: 18px 16px 20px;
            }
            .id-name .field-value {
                font-size: 22px;
            }
            .id-company .field-value {
                font-size: 20px;
            }
            .id-expiry .field-value {
                font-size: 20px;
            }
            .id-logo {
                height: 50px;
            }
        }

        /* ── TOAST / STATUS ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0b1a33;
            color: #fff;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.20);
            opacity: 0;
            transition: 0.35s;
            pointer-events: none;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }
        .toast i {
            font-size: 20px;
        }

        /* hidden file inputs */
        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>

    <!-- ─── TOAST ─── -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Done!</span>
    </div>

    <!-- ─── APP ─── -->
    <div class="app-container">

        <h1>
            <i class="fas fa-id-card"></i>
            ID Card Builder
        </h1>

        <div class="two-col">

            <!-- ===== LEFT: FORM ===== -->
            <div class="form-panel">

                <!-- COMPANY LOGO (rectangle, top) -->
                <div class="photo-upload-section">
                    <label style="font-weight:600; font-size:14px; color:#1f2a44; display:flex; align-items:center; gap:6px;">
                        <i class="fas fa-building"></i> Company Logo (image only)
                    </label>
                    <div class="photo-upload-row">
                        <div class="photo-preview-box" id="logoPreviewBox">
                            <i class="fas fa-image placeholder-icon" id="logoPlaceholderIcon"></i>
                            <img id="logoPreviewImg" style="display:none;" alt="company logo" />
                        </div>
                        <div class="photo-buttons">
                            <button class="btn-photo" id="logoUploadBtn">
                                <i class="fas fa-folder-open"></i> File
                            </button>
                            <button class="btn-photo primary" id="logoCameraBtn">
                                <i class="fas fa-camera"></i> Camera
                            </button>
                            <button class="btn-photo danger" id="removeLogoBtn">
                                <i class="fas fa-trash-alt"></i> Remove
                            </button>
                        </div>
                    </div>
                    <input type="file" id="logoFileInput" class="hidden-input" accept="image/*" />
                    <input type="file" id="logoCameraInput" class="hidden-input" accept="image/*" capture="environment" />
                    <div class="hint-big"><i class="fas fa-info-circle"></i> Upload a company logo (rectangle, any format)</div>
                </div>

                <!-- PHOTO (main) -->
                <div class="photo-upload-section">
                    <label style="font-weight:600; font-size:14px; color:#1f2a44; display:flex; align-items:center; gap:6px;">
                        <i class="fas fa-camera"></i> Driver Photo (rectangle)
                    </label>
                    <div class="photo-upload-row">
                        <div class="photo-preview-box main-photo" id="photoPreviewBox">
                            <i class="fas fa-image placeholder-icon" id="photoPlaceholderIcon"></i>
                            <img id="photoPreviewImg" style="display:none;" alt="driver photo" />
                        </div>
                        <div class="photo-buttons">
                            <button class="btn-photo" id="uploadBtn">
                                <i class="fas fa-folder-open"></i> File
                            </button>
                            <button class="btn-photo primary" id="cameraBtn">
                                <i class="fas fa-camera"></i> Camera
                            </button>
                            <button class="btn-photo danger" id="removePhotoBtn">
                                <i class="fas fa-trash-alt"></i> Remove
                            </button>
                        </div>
                    </div>
                    <input type="file" id="fileInput" class="hidden-input" accept="image/*" />
                    <input type="file" id="cameraInput" class="hidden-input" accept="image/*" capture="environment" />
                    <div class="hint-big"><i class="fas fa-info-circle"></i> Driver's portrait (rectangle)</div>
                </div>

                <!-- DRIVER'S NAME -->
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Driver's Name</label>
                    <input type="text" id="driverName" placeholder="Full name" value="JAMES R. CARTER" />
                    <div class="hint-big"><i class="fas fa-arrow-up"></i> Big font on card</div>
                </div>

                <!-- COMPANY NAME (text) -->
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Company Name (text)</label>
                    <input type="text" id="companyName" placeholder="Company" value="TRANSIT LOGISTICS" />
                    <div class="hint-big"><i class="fas fa-arrow-up"></i> Big font on card</div>
                </div>

                <!-- EXPIRATION DATE -->
                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Expiration Date</label>
                    <input type="text" id="expiryDate" placeholder="MM/YYYY" value="12/2028" />
                    <div class="hint-big"><i class="fas fa-arrow-up"></i> Big font on card</div>
                </div>

                <!-- ACTION BUTTONS -->
                <div class="action-bar">
                    <button class="btn-action save" id="saveBtn">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button class="btn-action preview" id="previewBtn">
                        <i class="fas fa-eye"></i> Preview
                    </button>
                    <button class="btn-action download" id="downloadBtn">
                        <i class="fas fa-download"></i> Download
                    </button>
                </div>

                <!-- COPYRIGHT — only in left panel, not on ID card -->
                <div class="left-copyright">
                    <i class="fas fa-copyright"></i>
                    <span class="field-value" id="leftCopyrightDisplay">© 2026 Jamal 0598 </span>
                </div>

            </div>

            <!-- ===== RIGHT: PREVIEW ===== -->
            <div class="preview-panel">
                <div class="preview-label">
                    <i class="fas fa-id-card"></i> Live Preview
                </div>

                <div class="id-card-wrapper">
                    <div class="id-card" id="idCard">

                        <!-- COMPANY LOGO (rectangle, very top) -->
                        <div class="id-logo" id="idLogo">
                            <i class="fas fa-image no-logo" id="idLogoPlaceholder"></i>
                            <img id="idLogoImg" style="display:none;" alt="Company Logo" />
                        </div>

                        <!-- DRIVER PHOTO (rectangle) -->
                        <div class="id-photo" id="idPhoto">
                            <i class="fas fa-user-circle no-photo" id="idPhotoPlaceholder"></i>
                            <img id="idPhotoImg" style="display:none;" alt="Driver photo" />
                        </div>

                        <!-- DRIVER'S NAME (big) -->
                        <div class="id-field id-name">
                            <span class="field-label">Name</span>
                            <span class="field-value" id="idNameDisplay">JAMES R. CARTER</span>
                        </div>

                        <!-- COMPANY NAME (big text) -->
                        <div class="id-field id-company">
                            <span class="field-label">Company</span>
                            <span class="field-value" id="idCompanyDisplay">TRANSIT LOGISTICS</span>
                        </div>

                        <!-- EXPIRATION DATE (big) -->
                        <div class="id-field id-expiry">
                            <span class="field-label">Expires</span>
                            <span class="field-value" id="idExpiryDisplay">12/2028</span>
                        </div>

                    </div>
                </div>

                <div style="font-size:13px; color:#7b8aa8; text-align:center; width:100%;">
                    <i class="fas fa-sync-alt fa-fw"></i> Updates live as you type
                </div>
            </div>

        </div><!-- /two-col -->
    </div><!-- /app-container -->

    <script>
        (function() {
            'use strict';

            // ── DOM refs ──
            const driverName = document.getElementById('driverName');
            const companyName = document.getElementById('companyName');
            const expiryDate = document.getElementById('expiryDate');

            const idNameDisplay = document.getElementById('idNameDisplay');
            const idCompanyDisplay = document.getElementById('idCompanyDisplay');
            const idExpiryDisplay = document.getElementById('idExpiryDisplay');

            // ── Left panel copyright (not on card) ──
            const leftCopyrightDisplay = document.getElementById('leftCopyrightDisplay');

            // ── Logo refs ──
            const logoFileInput = document.getElementById('logoFileInput');
            const logoCameraInput = document.getElementById('logoCameraInput');
            const logoUploadBtn = document.getElementById('logoUploadBtn');
            const logoCameraBtn = document.getElementById('logoCameraBtn');
            const removeLogoBtn = document.getElementById('removeLogoBtn');

            const logoPreviewBox = document.getElementById('logoPreviewBox');
            const logoPreviewImg = document.getElementById('logoPreviewImg');
            const logoPlaceholderIcon = document.getElementById('logoPlaceholderIcon');

            const idLogo = document.getElementById('idLogo');
            const idLogoImg = document.getElementById('idLogoImg');
            const idLogoPlaceholder = document.getElementById('idLogoPlaceholder');

            // ── Photo refs ──
            const fileInput = document.getElementById('fileInput');
            const cameraInput = document.getElementById('cameraInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const cameraBtn = document.getElementById('cameraBtn');
            const removePhotoBtn = document.getElementById('removePhotoBtn');

            const photoPreviewBox = document.getElementById('photoPreviewBox');
            const photoPreviewImg = document.getElementById('photoPreviewImg');
            const photoPlaceholderIcon = document.getElementById('photoPlaceholderIcon');

            const idPhoto = document.getElementById('idPhoto');
            const idPhotoImg = document.getElementById('idPhotoImg');
            const idPhotoPlaceholder = document.getElementById('idPhotoPlaceholder');

            // ── Buttons ──
            const saveBtn = document.getElementById('saveBtn');
            const previewBtn = document.getElementById('previewBtn');
            const downloadBtn = document.getElementById('downloadBtn');

            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');

            // ── state ──
            let currentLogoDataURL = null;
            let currentPhotoDataURL = null;

            // ── helpers ──
            function showToast(msg, icon = 'fa-check-circle') {
                toastMsg.textContent = msg;
                toast.querySelector('i').className = 'fas ' + icon;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 2800);
            }

            // update all preview fields from form values
            function updatePreviewFields() {
                idNameDisplay.textContent = driverName.value.trim() || '(Name)';
                idCompanyDisplay.textContent = companyName.value.trim() || '(Company)';
                idExpiryDisplay.textContent = expiryDate.value.trim() || 'MM/YYYY';
                // Left copyright – static, not on card
                leftCopyrightDisplay.textContent = '© 2026 Transit Logistics';
            }

            // ── Logo UI ──
            function updateLogoUI(dataURL) {
                if (dataURL) {
                    logoPreviewImg.src = dataURL;
                    logoPreviewImg.style.display = 'block';
                    logoPlaceholderIcon.style.display = 'none';

                    idLogoImg.src = dataURL;
                    idLogoImg.style.display = 'block';
                    idLogoPlaceholder.style.display = 'none';
                } else {
                    logoPreviewImg.src = '';
                    logoPreviewImg.style.display = 'none';
                    logoPlaceholderIcon.style.display = 'block';

                    idLogoImg.src = '';
                    idLogoImg.style.display = 'none';
                    idLogoPlaceholder.style.display = 'block';
                }
            }

            function setLogoFromFile(file) {
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    showToast('Please select an image file for the company logo.', 'fa-exclamation-triangle');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentLogoDataURL = e.target.result;
                    updateLogoUI(currentLogoDataURL);
                    showToast('Company logo loaded!', 'fa-check-circle');
                };
                reader.onerror = function() {
                    showToast('Failed to read logo file.', 'fa-exclamation-triangle');
                };
                reader.readAsDataURL(file);
            }

            // ── Photo UI ──
            function updatePhotoUI(dataURL) {
                if (dataURL) {
                    photoPreviewImg.src = dataURL;
                    photoPreviewImg.style.display = 'block';
                    photoPlaceholderIcon.style.display = 'none';

                    idPhotoImg.src = dataURL;
                    idPhotoImg.style.display = 'block';
                    idPhotoPlaceholder.style.display = 'none';
                } else {
                    photoPreviewImg.src = '';
                    photoPreviewImg.style.display = 'none';
                    photoPlaceholderIcon.style.display = 'block';

                    idPhotoImg.src = '';
                    idPhotoImg.style.display = 'none';
                    idPhotoPlaceholder.style.display = 'block';
                }
            }

            function setPhotoFromFile(file) {
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    showToast('Please select an image file for the driver photo.', 'fa-exclamation-triangle');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentPhotoDataURL = e.target.result;
                    updatePhotoUI(currentPhotoDataURL);
                    showToast('Driver photo loaded!', 'fa-check-circle');
                };
                reader.onerror = function() {
                    showToast('Failed to read photo file.', 'fa-exclamation-triangle');
                };
                reader.readAsDataURL(file);
            }

            // ── EVENT: Logo upload ──
            logoUploadBtn.addEventListener('click', () => logoFileInput.click());
            logoFileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    setLogoFromFile(this.files[0]);
                }
                this.value = '';
            });

            logoCameraBtn.addEventListener('click', () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    showToast('Camera not supported on this device.', 'fa-exclamation-triangle');
                    return;
                }
                logoCameraInput.click();
            });
            logoCameraInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    setLogoFromFile(this.files[0]);
                }
                this.value = '';
            });

            removeLogoBtn.addEventListener('click', () => {
                currentLogoDataURL = null;
                updateLogoUI(null);
                showToast('Company logo removed.', 'fa-trash-alt');
            });

            // ── EVENT: Photo upload ──
            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    setPhotoFromFile(this.files[0]);
                }
                this.value = '';
            });

            cameraBtn.addEventListener('click', () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    showToast('Camera not supported on this device.', 'fa-exclamation-triangle');
                    return;
                }
                cameraInput.click();
            });
            cameraInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    setPhotoFromFile(this.files[0]);
                }
                this.value = '';
            });

            removePhotoBtn.addEventListener('click', () => {
                currentPhotoDataURL = null;
                updatePhotoUI(null);
                showToast('Driver photo removed.', 'fa-trash-alt');
            });

            // ── EVENT: form fields → live preview ──
            [driverName, companyName, expiryDate].forEach(field => {
                field.addEventListener('input', updatePreviewFields);
                field.addEventListener('change', updatePreviewFields);
            });

            // ── SAVE ──
            saveBtn.addEventListener('click', () => {
                try {
                    const data = {
                        name: driverName.value,
                        company: companyName.value,
                        expiry: expiryDate.value,
                        logo: currentLogoDataURL,
                        photo: currentPhotoDataURL,
                    };
                    localStorage.setItem('idCardData', JSON.stringify(data));
                    showToast('Saved to browser!', 'fa-save');
                } catch (_) {
                    showToast('Could not save.', 'fa-exclamation-triangle');
                }
            });

            // ── PREVIEW ──
            previewBtn.addEventListener('click', () => {
                updatePreviewFields();
                if (currentLogoDataURL) updateLogoUI(currentLogoDataURL);
                else updateLogoUI(null);
                if (currentPhotoDataURL) updatePhotoUI(currentPhotoDataURL);
                else updatePhotoUI(null);
                showToast('Preview updated.', 'fa-eye');
            });

            // ── DOWNLOAD (as PNG) ──
            downloadBtn.addEventListener('click', () => {
                const card = document.getElementById('idCard');
                updatePreviewFields();
                if (currentLogoDataURL) updateLogoUI(currentLogoDataURL);
                else updateLogoUI(null);
                if (currentPhotoDataURL) updatePhotoUI(currentPhotoDataURL);
                else updatePhotoUI(null);

                if (typeof html2canvas === 'undefined') {
                    showToast('Please wait, loading library…', 'fa-clock');
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                    script.onload = function() {
                        showToast('Library loaded. Click Download again.', 'fa-check-circle');
                    };
                    script.onerror = function() {
                        showToast('Failed to load download library.', 'fa-exclamation-triangle');
                    };
                    document.head.appendChild(script);
                    return;
                }

                html2canvas(card, {
                    scale: 2.5,
                    backgroundColor: '#ffffff',
                    allowTaint: false,
                    useCORS: true,
                    logging: false,
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'id-card.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('Downloaded!', 'fa-download');
                }).catch(err => {
                    console.warn(err);
                    showToast('Download failed. Try again.', 'fa-exclamation-triangle');
                });
            });

            // ── LOAD from localStorage ──
            function loadFromStorage() {
                try {
                    const raw = localStorage.getItem('idCardData');
                    if (!raw) return;
                    const data = JSON.parse(raw);
                    if (data.name) driverName.value = data.name;
                    if (data.company) companyName.value = data.company;
                    if (data.expiry) expiryDate.value = data.expiry;
                    if (data.logo) {
                        currentLogoDataURL = data.logo;
                        updateLogoUI(currentLogoDataURL);
                    }
                    if (data.photo) {
                        currentPhotoDataURL = data.photo;
                        updatePhotoUI(currentPhotoDataURL);
                    }
                    updatePreviewFields();
                } catch (_) { /* ignore */ }
            }

            // ── INIT ──
            updatePreviewFields();
            loadFromStorage();

            if (!currentLogoDataURL) updateLogoUI(null);
            if (!currentPhotoDataURL) updatePhotoUI(null);

            console.log('ID Card ready. Copyright appears only in left panel (not on card).');
        })();
    </script>

    <!-- html2canvas for download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer>
    </script>

</body>
</html>
